<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riot Roll — Number Scramble</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green:  #00FF88;
    --yellow: #FFE000;
    --red:    #FF2D2D;
    --blue:   #00C2FF;
    --dark:   #0A0A0A;
    --mid:    #1A1A1A;
    --text:   #F0F0F0;
  }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Courier New', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    padding: 16px;
  }
  #game-label {
    font-size: clamp(1.1rem, 4vw, 1.6rem);
    font-weight: 700;
    letter-spacing: 0.3em;
    color: var(--yellow);
    margin-bottom: 4px;
  }
  #stake-label { font-size: 0.7rem; letter-spacing: 0.15em; opacity: 0.4; margin-bottom: 24px; }

  #hud {
    display: flex;
    justify-content: space-between;
    width: min(360px, 92vw);
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    opacity: 0.6;
    margin-bottom: 16px;
  }

  /* Target sequence display */
  #target-box {
    width: min(360px, 92vw);
    background: var(--mid);
    border: 2px solid #2a2a2a;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    margin-bottom: 16px;
  }
  #target-label { font-size: 0.6rem; letter-spacing: 0.2em; opacity: 0.4; margin-bottom: 8px; }
  #target-seq {
    font-size: clamp(1.8rem, 8vw, 2.8rem);
    font-weight: 700;
    letter-spacing: 0.3em;
    color: var(--blue);
  }

  /* Player input display */
  #input-box {
    width: min(360px, 92vw);
    background: var(--mid);
    border: 2px solid #333;
    border-radius: 12px;
    padding: 16px;
    text-align: center;
    margin-bottom: 20px;
    min-height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #input-box.correct { border-color: var(--green); background: #0d2018; }
  #input-box.wrong   { border-color: var(--red);   background: #2a0d0d; animation: shake 0.3s ease; }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25%     { transform: translateX(-8px); }
    75%     { transform: translateX(8px); }
  }
  #input-display {
    font-size: clamp(1.8rem, 8vw, 2.8rem);
    font-weight: 700;
    letter-spacing: 0.3em;
    color: var(--text);
    min-width: 20px;
    min-height: 40px;
  }
  #cursor {
    display: inline-block;
    width: 3px;
    height: 1em;
    background: var(--yellow);
    margin-left: 4px;
    vertical-align: middle;
    animation: blink 0.8s step-end infinite;
  }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

  /* Number pad */
  #numpad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: min(360px, 92vw);
    margin-bottom: 16px;
  }
  .num-btn {
    height: 60px;
    border-radius: 10px;
    background: var(--mid);
    border: 2px solid #2a2a2a;
    color: var(--text);
    font-size: 1.3rem;
    font-family: 'Courier New', monospace;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.07s, background 0.07s;
    -webkit-tap-highlight-color: transparent;
  }
  .num-btn:active { transform: scale(0.88); background: #2a2a2a; }
  #btn-del  { color: var(--red); font-size: 1rem; }
  #btn-zero { grid-column: span 1; }

  #timer-wrap { width: min(360px, 92vw); height: 3px; background: #1f1f1f; border-radius: 2px; overflow: hidden; margin-bottom: 16px; }
  #timer-bar  { height: 100%; background: var(--yellow); width: 100%; transform-origin: left; }

  #result-area { text-align: center; min-height: 60px; }
  #outcome { font-size: clamp(1.6rem, 8vw, 2.4rem); font-weight: 700; letter-spacing: 0.1em; display: none; }
  #outcome.win  { color: var(--green); }
  #outcome.lose { color: var(--red); }
  #sub-result { font-size: 0.7rem; letter-spacing: 0.1em; opacity: 0.5; margin-top: 8px; }
</style>
</head>
<body>

<div id="game-label">NUMBER SCRAMBLE</div>
<div id="stake-label">RENT AT STAKE: <span id="stake-amount">£0</span></div>

<div id="hud">
  <span>ROUND: <span id="round-display" style="color:var(--blue)">1</span>/5</span>
  <span>SCORE: <span id="score-display" style="color:var(--green)">0</span></span>
</div>

<div id="target-box">
  <div id="target-label">TYPE THIS NUMBER</div>
  <div id="target-seq">—</div>
</div>

<div id="input-box">
  <div id="input-display"><span id="cursor"></span></div>
</div>

<div id="numpad">
  <button class="num-btn" data-val="1">1</button>
  <button class="num-btn" data-val="2">2</button>
  <button class="num-btn" data-val="3">3</button>
  <button class="num-btn" data-val="4">4</button>
  <button class="num-btn" data-val="5">5</button>
  <button class="num-btn" data-val="6">6</button>
  <button class="num-btn" data-val="7">7</button>
  <button class="num-btn" data-val="8">8</button>
  <button class="num-btn" data-val="9">9</button>
  <button class="num-btn" id="btn-del" data-val="del">⌫</button>
  <button class="num-btn" id="btn-zero" data-val="0">0</button>
  <button class="num-btn" data-val="ok" style="color:var(--green);border-color:#0d2018">OK</button>
</div>

<div id="timer-wrap"><div id="timer-bar"></div></div>
<div id="result-area">
  <div id="outcome"></div>
  <div id="sub-result"></div>
</div>

<script>
  const p            = new URLSearchParams(location.search)
  const MINIGAME_ID  = p.get('minigame_id') || 'demo'
  const PLAYER_ID    = p.get('player_id')   || 'demo'
  const RENT         = parseInt(p.get('rent') || '0')
  const TOKEN        = p.get('token')        || ''
  const SUPABASE_URL = p.get('url')          || ''
  const SUPABASE_KEY = p.get('key')          || ''

  document.getElementById('stake-amount').textContent = `£${RENT}`

  const TOTAL_ROUNDS   = 5
  const GAME_DURATION  = 45000
  const LENGTHS        = [3, 4, 4, 5, 6]  // digit count per round

  let round      = 0
  let score      = 0
  let input      = ''
  let target     = ''
  let roundStart = 0
  let finished   = false
  let startTime  = performance.now()
  let rafId      = null
  let pollId     = null

  const targetSeq    = document.getElementById('target-seq')
  const inputDisplay = document.getElementById('input-display')
  const inputBox     = document.getElementById('input-box')
  const roundDisplay = document.getElementById('round-display')
  const scoreDisplay = document.getElementById('score-display')
  const timerBar     = document.getElementById('timer-bar')
  const outcome      = document.getElementById('outcome')
  const subResult    = document.getElementById('sub-result')

  function generateNumber(length) {
    let n = ''
    for (let i = 0; i < length; i++) n += Math.floor(Math.random() * 10)
    return n
  }

  function updateInputDisplay() {
    inputDisplay.innerHTML = input + '<span id="cursor"></span>'
  }

  function nextRound() {
    if (round >= TOTAL_ROUNDS) { endGame(); return }
    input = ''
    target = generateNumber(LENGTHS[round])
    roundStart = performance.now()
    roundDisplay.textContent = round + 1
    targetSeq.textContent = target
    inputBox.className = ''
    updateInputDisplay()

    // Brief show then hide for harder rounds
    if (round >= 2) {
      setTimeout(() => {
        if (!finished) targetSeq.style.filter = 'blur(6px)'
      }, 1000 + round * 200)
    }
    targetSeq.style.filter = 'none'
  }

  function onKey(val) {
    if (finished) return
    if (val === 'del') {
      input = input.slice(0, -1)
      updateInputDisplay()
    } else if (val === 'ok') {
      checkAnswer()
    } else {
      if (input.length >= LENGTHS[round]) return
      input += val
      updateInputDisplay()
      // Auto-submit when full length reached
      if (input.length === LENGTHS[round]) {
        setTimeout(checkAnswer, 150)
      }
    }
  }

  function checkAnswer() {
    if (input === target) {
      const elapsed = (performance.now() - roundStart) / 1000
      const timeBonus = Math.max(0, Math.round((5 - elapsed) * 50))
      const roundScore = 200 + timeBonus
      score += roundScore
      scoreDisplay.textContent = score
      inputBox.classList.add('correct')
      setTimeout(() => { round++; nextRound() }, 400)
    } else {
      inputBox.classList.add('wrong')
      setTimeout(() => {
        input = ''
        updateInputDisplay()
        inputBox.classList.remove('wrong')
        targetSeq.style.filter = 'none'
      }, 500)
    }
  }

  // Numpad clicks
  document.getElementById('numpad').addEventListener('pointerdown', (e) => {
    const btn = e.target.closest('.num-btn')
    if (btn) onKey(btn.dataset.val)
  })

  // Timer
  function tick() {
    const elapsed = performance.now() - startTime
    const rem = Math.max(0, 1 - elapsed / GAME_DURATION)
    timerBar.style.transform = `scaleX(${rem})`
    if (rem <= 0.25) timerBar.style.background = 'var(--red)'
    if (rem <= 0 && !finished) endGame()
    else if (!finished) rafId = requestAnimationFrame(tick)
  }

  function endGame() {
    if (finished) return
    finished = true
    cancelAnimationFrame(rafId)
    submitScore(score)
  }

  async function submitScore(finalScore) {
    subResult.textContent = `YOUR SCORE: ${finalScore}`
    if (MINIGAME_ID === 'demo') {
      const opp = 200 + Math.floor(Math.random() * 800)
      setTimeout(() => showResult(finalScore >= opp ? 'win' : 'lose', finalScore), 800)
      return
    }
    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/submit-score`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` },
        body: JSON.stringify({ minigame_id: MINIGAME_ID, score: finalScore })
      })
      const data = await res.json()
      if (data.resolved) {
        showResult(data.winner_id === PLAYER_ID ? 'win' : 'lose', finalScore, data.scores)
      } else {
        subResult.textContent = `YOUR SCORE: ${finalScore} — WAITING…`
        pollId = setInterval(async () => {
          try {
            const r = await fetch(`${SUPABASE_URL}/rest/v1/mini_games?id=eq.${MINIGAME_ID}&select=status,winner_id,scores`,
              { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN}` } })
            const [mg] = await r.json()
            if (mg?.status === 'resolved') { clearInterval(pollId); showResult(mg.winner_id === PLAYER_ID ? 'win' : 'lose', finalScore, mg.scores) }
          } catch(e) {}
        }, 2000)
        setTimeout(() => clearInterval(pollId), 55000)
      }
    } catch(err) { subResult.textContent = 'CONNECTION ERROR' }
  }

  function showResult(result, myScore) {
    outcome.style.display = 'block'
    outcome.className = result === 'win' ? 'win' : 'lose'
    outcome.textContent = result === 'win' ? 'YOU WIN!' : 'YOU LOSE'
    subResult.textContent = `SCORE: ${myScore} pts`
    setTimeout(() => window.parent?.postMessage({ type: 'minigame_done', result, score: myScore }, '*'), 2500)
  }

  nextRound()
  rafId = requestAnimationFrame(tick)
</script>
</body>
</html>
