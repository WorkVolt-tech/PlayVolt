<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riot Roll — Color Match</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green:  #00FF88;
    --yellow: #FFE000;
    --red:    #FF2D2D;
    --dark:   #0A0A0A;
    --mid:    #1A1A1A;
    --text:   #F0F0F0;
  }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Courier New', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    padding: 16px;
  }
  #game-label {
    font-size: clamp(1.1rem, 4vw, 1.6rem);
    font-weight: 700;
    letter-spacing: 0.3em;
    color: var(--yellow);
    margin-bottom: 4px;
  }
  #stake-label {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    opacity: 0.4;
    margin-bottom: 24px;
  }
  #score-row {
    display: flex;
    justify-content: space-between;
    width: min(360px, 92vw);
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    opacity: 0.6;
    margin-bottom: 20px;
  }
  #score-display { color: var(--green); }
  #streak-display { color: var(--yellow); }

  /* Word display */
  #word-box {
    width: min(360px, 92vw);
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    background: var(--mid);
    border: 2px solid #2a2a2a;
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }
  #word-text {
    font-size: clamp(2rem, 10vw, 3.2rem);
    font-weight: 700;
    letter-spacing: 0.05em;
    transition: opacity 0.1s;
  }
  #instruction {
    position: absolute;
    bottom: 8px;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    opacity: 0.35;
  }

  /* Color buttons */
  #buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    width: min(360px, 92vw);
    margin-bottom: 20px;
  }
  .color-btn {
    height: 72px;
    border-radius: 12px;
    border: 2px solid transparent;
    font-size: 0.75rem;
    font-family: 'Courier New', monospace;
    font-weight: 700;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: transform 0.08s, border-color 0.1s, filter 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .color-btn:active { transform: scale(0.93); }
  .color-btn.correct {
    border-color: var(--green);
    filter: brightness(1.4);
    animation: correct-pop 0.25s ease;
  }
  .color-btn.wrong {
    border-color: var(--red);
    filter: brightness(0.6);
    animation: wrong-shake 0.3s ease;
  }
  @keyframes correct-pop {
    0%   { transform: scale(1.08); }
    100% { transform: scale(1); }
  }
  @keyframes wrong-shake {
    0%,100% { transform: translateX(0); }
    30%     { transform: translateX(-6px); }
    70%     { transform: translateX(6px); }
  }

  #timer-wrap {
    width: min(360px, 92vw);
    height: 3px;
    background: #1f1f1f;
    border-radius: 2px;
    overflow: hidden;
  }
  #timer-bar {
    height: 100%;
    background: var(--yellow);
    width: 100%;
    transform-origin: left;
  }
  #result-area {
    margin-top: 20px;
    text-align: center;
    min-height: 60px;
  }
  #outcome {
    font-size: clamp(1.6rem, 8vw, 2.4rem);
    font-weight: 700;
    letter-spacing: 0.1em;
    display: none;
  }
  #outcome.win  { color: var(--green); }
  #outcome.lose { color: var(--red); }
  #sub-result { font-size: 0.7rem; letter-spacing: 0.1em; opacity: 0.5; margin-top: 8px; }
</style>
</head>
<body>

<div id="game-label">COLOR MATCH</div>
<div id="stake-label">RENT AT STAKE: <span id="stake-amount">£0</span></div>

<div id="score-row">
  <span>SCORE: <span id="score-display">0</span></span>
  <span>STREAK: <span id="streak-display">0</span></span>
</div>

<div id="word-box">
  <div id="word-text">RED</div>
  <div id="instruction">TAP THE INK COLOR — NOT THE WORD</div>
</div>

<div id="buttons"></div>

<div id="timer-wrap"><div id="timer-bar"></div></div>
<div id="result-area">
  <div id="outcome"></div>
  <div id="sub-result"></div>
</div>

<script>
  const p            = new URLSearchParams(location.search)
  const MINIGAME_ID  = p.get('minigame_id') || 'demo'
  const PLAYER_ID    = p.get('player_id')   || 'demo'
  const RENT         = parseInt(p.get('rent') || '0')
  const TOKEN        = p.get('token')        || ''
  const SUPABASE_URL = p.get('url')          || ''
  const SUPABASE_KEY = p.get('key')          || ''

  document.getElementById('stake-amount').textContent = `£${RENT}`

  const GAME_DURATION = 20000
  const COLORS = [
    { name: 'RED',    hex: '#FF2D2D' },
    { name: 'GREEN',  hex: '#00FF88' },
    { name: 'BLUE',   hex: '#00C2FF' },
    { name: 'YELLOW', hex: '#FFE000' },
  ]

  let score    = 0
  let streak   = 0
  let locked   = false
  let finished = false
  let startTime= performance.now()
  let rafId    = null
  let currentInkColor = null
  let pollId   = null

  const wordText     = document.getElementById('word-text')
  const buttonsDiv   = document.getElementById('buttons')
  const scoreDisplay = document.getElementById('score-display')
  const streakDisplay= document.getElementById('streak-display')
  const timerBar     = document.getElementById('timer-bar')
  const outcome      = document.getElementById('outcome')
  const subResult    = document.getElementById('sub-result')

  // Build buttons
  COLORS.forEach(c => {
    const btn = document.createElement('button')
    btn.className = 'color-btn'
    btn.textContent = c.name
    btn.style.background = c.hex
    btn.style.color = '#0A0A0A'
    btn.dataset.color = c.name
    btn.addEventListener('pointerdown', () => onAnswer(c.name, btn))
    buttonsDiv.appendChild(btn)
  })

  function randomFrom(arr) { return arr[Math.floor(Math.random() * arr.length)] }

  function nextRound() {
    if (finished) return
    locked = false

    // Word = random color name, ink = DIFFERENT random color
    const wordColor = randomFrom(COLORS)
    let inkColor
    do { inkColor = randomFrom(COLORS) } while (inkColor.name === wordColor.name)

    currentInkColor = inkColor.name
    wordText.textContent = wordColor.name
    wordText.style.color = inkColor.hex
    wordText.style.opacity = '0'
    setTimeout(() => { wordText.style.opacity = '1' }, 60)
  }

  function onAnswer(colorName, btn) {
    if (locked || finished) return
    locked = true

    if (colorName === currentInkColor) {
      streak++
      const elapsed = performance.now() - startTime
      const speedBonus = Math.max(0, 20 - Math.floor(elapsed / 1000))
      score += 100 + streak * 10 + speedBonus
      scoreDisplay.textContent = score
      streakDisplay.textContent = streak
      btn.classList.add('correct')
      setTimeout(() => { btn.classList.remove('correct'); nextRound() }, 250)
    } else {
      streak = 0
      streakDisplay.textContent = 0
      btn.classList.add('wrong')
      // Flash correct button
      const correctBtn = [...buttonsDiv.children].find(b => b.dataset.color === currentInkColor)
      if (correctBtn) {
        correctBtn.classList.add('correct')
        setTimeout(() => correctBtn.classList.remove('correct'), 400)
      }
      setTimeout(() => { btn.classList.remove('wrong'); nextRound() }, 500)
    }
  }

  // Timer
  function tick() {
    const elapsed = performance.now() - startTime
    const rem = Math.max(0, 1 - elapsed / GAME_DURATION)
    timerBar.style.transform = `scaleX(${rem})`
    if (rem <= 0.25) timerBar.style.background = 'var(--red)'
    if (rem <= 0 && !finished) endGame()
    else if (!finished) rafId = requestAnimationFrame(tick)
  }

  function endGame() {
    if (finished) return
    finished = true
    cancelAnimationFrame(rafId)
    locked = true
    submitScore(score)
  }

  async function submitScore(finalScore) {
    subResult.textContent = `YOUR SCORE: ${finalScore}`
    if (MINIGAME_ID === 'demo') {
      const opp = 300 + Math.floor(Math.random() * 700)
      setTimeout(() => showResult(finalScore >= opp ? 'win' : 'lose', finalScore), 800)
      return
    }
    try {
      const res = await fetch(`${SUPABASE_URL}/functions/v1/submit-score`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` },
        body: JSON.stringify({ minigame_id: MINIGAME_ID, score: finalScore })
      })
      const data = await res.json()
      if (data.resolved) {
        showResult(data.winner_id === PLAYER_ID ? 'win' : 'lose', finalScore, data.scores)
      } else {
        subResult.textContent = `YOUR SCORE: ${finalScore} — WAITING…`
        pollId = setInterval(async () => {
          try {
            const r = await fetch(`${SUPABASE_URL}/rest/v1/mini_games?id=eq.${MINIGAME_ID}&select=status,winner_id,scores`,
              { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${TOKEN}` } })
            const [mg] = await r.json()
            if (mg?.status === 'resolved') { clearInterval(pollId); showResult(mg.winner_id === PLAYER_ID ? 'win' : 'lose', finalScore, mg.scores) }
          } catch(e) {}
        }, 2000)
        setTimeout(() => clearInterval(pollId), 30000)
      }
    } catch(err) { subResult.textContent = 'CONNECTION ERROR' }
  }

  function showResult(result, myScore) {
    outcome.style.display = 'block'
    outcome.className = result === 'win' ? 'win' : 'lose'
    outcome.textContent = result === 'win' ? 'YOU WIN!' : 'YOU LOSE'
    subResult.textContent = `SCORE: ${myScore} pts`
    setTimeout(() => window.parent?.postMessage({ type: 'minigame_done', result, score: myScore }, '*'), 2500)
  }

  nextRound()
  rafId = requestAnimationFrame(tick)
</script>
</body>
</html>
