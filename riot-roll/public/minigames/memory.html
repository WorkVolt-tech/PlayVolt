<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riot Roll — Memory Flip</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green:  #00FF88;
    --yellow: #FFE000;
    --red:    #FF2D2D;
    --blue:   #00C2FF;
    --purple: #C97BFF;
    --dark:   #0A0A0A;
    --mid:    #1A1A1A;
    --card:   #222222;
    --text:   #F0F0F0;
  }
  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Courier New', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    padding: 16px;
  }
  #game-label {
    font-size: clamp(1.1rem, 4vw, 1.6rem);
    font-weight: 700;
    letter-spacing: 0.3em;
    color: var(--yellow);
    margin-bottom: 4px;
  }
  #stake-label {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    opacity: 0.4;
    margin-bottom: 16px;
  }
  #status-bar {
    display: flex;
    justify-content: space-between;
    width: min(360px, 92vw);
    margin-bottom: 16px;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    opacity: 0.6;
  }
  #matches-count { color: var(--green); }
  #timer-text    { color: var(--yellow); }

  /* Card grid */
  #grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    width: min(360px, 92vw);
  }
  .card {
    aspect-ratio: 1;
    border-radius: 10px;
    background: var(--card);
    border: 2px solid #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(1.4rem, 6vw, 2rem);
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s, background 0.15s;
    position: relative;
    overflow: hidden;
  }
  .card:active { transform: scale(0.92); }
  .card .face   { display: none; }
  .card .back   { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }

  .card.flipped .face { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
  .card.flipped .back { display: none; }
  .card.flipped { border-color: var(--blue); background: #1a2530; }

  .card.matched {
    border-color: var(--green);
    background: #0d2018;
    cursor: default;
    pointer-events: none;
  }
  .card.matched .face { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
  .card.matched .back { display: none; }

  .card.wrong {
    border-color: var(--red);
    background: #2a0d0d;
    animation: wrong-shake 0.35s ease;
  }
  @keyframes wrong-shake {
    0%,100% { transform: translateX(0); }
    25%     { transform: translateX(-5px); }
    75%     { transform: translateX(5px); }
  }

  /* Timer bar */
  #timer-wrap {
    width: min(360px, 92vw);
    height: 3px;
    background: #1f1f1f;
    border-radius: 2px;
    margin-top: 16px;
    overflow: hidden;
  }
  #timer-bar {
    height: 100%;
    background: var(--yellow);
    width: 100%;
    transform-origin: left;
  }

  #result-area {
    margin-top: 20px;
    text-align: center;
    min-height: 60px;
  }
  #outcome {
    font-size: clamp(1.6rem, 8vw, 2.4rem);
    font-weight: 700;
    letter-spacing: 0.1em;
    display: none;
  }
  #outcome.win  { color: var(--green); }
  #outcome.lose { color: var(--red); }
  #sub-result {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    opacity: 0.5;
    margin-top: 8px;
  }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="game-label">MEMORY FLIP</div>
<div id="stake-label">RENT AT STAKE: <span id="stake-amount">£0</span></div>

<div id="status-bar">
  <span>MATCHES: <span id="matches-count">0</span>/8</span>
  <span id="timer-text">10s</span>
</div>

<div id="grid"></div>

<div id="timer-wrap"><div id="timer-bar"></div></div>

<div id="result-area">
  <div id="outcome"></div>
  <div id="sub-result"></div>
</div>

<script>
  const p            = new URLSearchParams(location.search)
  const MINIGAME_ID  = p.get('minigame_id') || 'demo'
  const PLAYER_ID    = p.get('player_id')   || 'demo'
  const RENT         = parseInt(p.get('rent') || '0')
  const SUPABASE_URL = p.get('url')          || ''
  const SUPABASE_KEY = p.get('key')          || ''

  document.getElementById('stake-amount').textContent = `£${RENT}`

  // Init Supabase directly in the mini-game
  if (SUPABASE_URL && SUPABASE_KEY && typeof supabase !== 'undefined') {
    window._db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
  }
  const TYPE_LOWER_BETTER = false

  const GAME_DURATION = 30000 // 30 seconds
  const EMOJIS = ['🏠','🏦','🎲','💰','🚀','⚡','🔥','💎']
  const PAIRS  = [...EMOJIS, ...EMOJIS]

  // Shuffle pairs
  function shuffle(arr) {
    const a = [...arr]
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]]
    }
    return a
  }

  let cards       = shuffle(PAIRS)
  let flipped     = []      // indices of currently flipped cards
  let matched     = new Set()
  let locked      = false   // prevent clicking while checking pair
  let matches     = 0
  let startTime   = performance.now()
  let finished    = false
  let rafId       = null
  let pollId      = null

  const grid         = document.getElementById('grid')
  const matchesCount = document.getElementById('matches-count')
  const timerText    = document.getElementById('timer-text')
  const timerBar     = document.getElementById('timer-bar')
  const outcome      = document.getElementById('outcome')
  const subResult    = document.getElementById('sub-result')

  // ── Build grid ───────────────────────────────────────────────
  cards.forEach((emoji, i) => {
    const card = document.createElement('div')
    card.className = 'card'
    card.dataset.index = i
    card.dataset.emoji = emoji
    card.innerHTML = `
      <div class="back" style="font-size:1.2rem;opacity:0.15">?</div>
      <div class="face">${emoji}</div>
    `
    card.addEventListener('click', () => onCardClick(card, i))
    grid.appendChild(card)
  })

  // ── Timer ────────────────────────────────────────────────────
  function tick() {
    const elapsed = performance.now() - startTime
    const remaining = Math.max(0, GAME_DURATION - elapsed)
    const secs = Math.ceil(remaining / 1000)
    timerText.textContent = `${secs}s`
    timerBar.style.transform = `scaleX(${remaining / GAME_DURATION})`

    if (remaining <= 5000) timerBar.style.background = 'var(--red)'

    if (remaining <= 0 && !finished) {
      endGame()
    } else if (!finished) {
      rafId = requestAnimationFrame(tick)
    }
  }
  rafId = requestAnimationFrame(tick)

  // ── Card click ───────────────────────────────────────────────
  function onCardClick(card, index) {
    if (finished || locked) return
    if (matched.has(index)) return
    if (flipped.includes(index)) return
    if (flipped.length >= 2) return

    card.classList.add('flipped')
    flipped.push(index)

    if (flipped.length === 2) {
      locked = true
      const [i1, i2] = flipped
      const c1 = grid.children[i1]
      const c2 = grid.children[i2]

      if (cards[i1] === cards[i2]) {
        // Match!
        setTimeout(() => {
          c1.classList.remove('flipped')
          c2.classList.remove('flipped')
          c1.classList.add('matched')
          c2.classList.add('matched')
          matched.add(i1)
          matched.add(i2)
          matches++
          matchesCount.textContent = matches
          flipped = []
          locked = false

          if (matches === EMOJIS.length) endGame() // all matched
        }, 300)
      } else {
        // No match
        c1.classList.add('wrong')
        c2.classList.add('wrong')
        setTimeout(() => {
          c1.classList.remove('flipped', 'wrong')
          c2.classList.remove('flipped', 'wrong')
          flipped = []
          locked = false
        }, 700)
      }
    }
  }

  // ── End game ─────────────────────────────────────────────────
  function endGame() {
    if (finished) return
    finished = true
    cancelAnimationFrame(rafId)

    // Score = matches found × 100, minus time taken in seconds
    const elapsed = (performance.now() - startTime) / 1000
    const score = Math.max(0, (matches * 100) - Math.round(elapsed))
    submitScore(score)
  }

  // ── Submit ───────────────────────────────────────────────────
async function submitScore(score) {
    subResult.textContent = `YOUR SCORE: ${typeof score === 'number' && score < 1000 && MINIGAME_ID !== 'demo' ? score + 'ms' : score}`

    if (MINIGAME_ID === 'demo') {
      const opp = Math.floor(Math.random() * 800) + 100
      const wonDemo = TYPE_LOWER_BETTER ? score < opp : score >= opp
      setTimeout(() => showResult(wonDemo ? 'win' : 'lose', score), 800)
      return
    }

    try {
      // Submit score directly to Supabase — no Edge Function needed
      const { data: mg, error: fetchErr } = await window._db
        .from('mini_games')
        .select('scores, participants, status, winner_id')
        .eq('id', MINIGAME_ID)
        .single()

      if (fetchErr || !mg) { subResult.textContent = 'GAME NOT FOUND'; return }
      if (mg.status === 'resolved') {
        showResult(mg.winner_id === PLAYER_ID ? 'win' : 'lose', score)
        return
      }

      // Add our score
      const updatedScores = { ...mg.scores, [PLAYER_ID]: score }
      await window._db
        .from('mini_games')
        .update({ scores: updatedScores })
        .eq('id', MINIGAME_ID)

      // Check if all participants submitted
      const allIn = mg.participants.every(pid => updatedScores[pid] !== undefined)

      if (allIn) {
        // Resolve winner locally
        const entries = Object.entries(updatedScores)
        let winnerId = entries[0][0]
        let best = entries[0][1]
        for (const [pid, s] of entries) {
          if (TYPE_LOWER_BETTER ? s < best : s > best) { best = s; winnerId = pid }
        }
        await window._db
          .from('mini_games')
          .update({ status: 'resolved', winner_id: winnerId })
          .eq('id', MINIGAME_ID)
        showResult(winnerId === PLAYER_ID ? 'win' : 'lose', score)
      } else {
        subResult.textContent = `YOUR SCORE SUBMITTED — WAITING FOR OPPONENT…`
        // Poll for resolution
        const poll = setInterval(async () => {
          const { data: resolved } = await window._db
            .from('mini_games')
            .select('status, winner_id')
            .eq('id', MINIGAME_ID)
            .single()
          if (resolved?.status === 'resolved') {
            clearInterval(poll)
            showResult(resolved.winner_id === PLAYER_ID ? 'win' : 'lose', score)
          }
        }, 2000)
        setTimeout(() => clearInterval(poll), 30000)
      }
    } catch(err) {
      console.error(err)
      subResult.textContent = 'CONNECTION ERROR'
    }
  }

  function showResult(result, myScore, allScores) {
    outcome.style.display = 'block'
    if (result === 'win') {
      outcome.className = 'win'
      outcome.textContent = 'YOU WIN!'
    } else {
      outcome.className = 'lose'
      outcome.textContent = 'YOU LOSE'
    }
    subResult.textContent = `YOUR SCORE: ${myScore} pts`
    setTimeout(() => {
      window.parent?.postMessage({ type: 'minigame_done', result, score: myScore }, '*')
    }, 2500)
  }
</script>
</body>
</html>
