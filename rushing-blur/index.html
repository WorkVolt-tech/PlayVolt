<script type="module">
import * as THREE from 'three';

// ══════════════════════════════════════════════
//  TRACK (bigger, more interesting shape)
// ══════════════════════════════════════════════
function makeTrackCurve() {
  const pts = [];
  const N = 300;
  for (let i = 0; i < N; i++) {
    const t = (i / N) * Math.PI * 2;
    // Larger, more complex figure
    const x = Math.sin(t)*220 + Math.sin(t*2)*70 + Math.cos(t*3)*30;
    const z = Math.cos(t)*160 + Math.cos(t*2)*50 + Math.sin(t*4)*20;
    pts.push(new THREE.Vector3(x, 0, z));
  }
  return new THREE.CatmullRomCurve3(pts, true);
}

function buildTrack(scene, curve) {
  const W = 16, SEG = 700;
  const verts=[], uvs=[], idx=[];
  for (let i=0;i<=SEG;i++) {
    const t=i/SEG, p=curve.getPointAt(t), tan=curve.getTangentAt(t);
    const right=new THREE.Vector3().crossVectors(tan,new THREE.Vector3(0,1,0)).normalize();
    const L=p.clone().addScaledVector(right,-W/2);
    const R=p.clone().addScaledVector(right, W/2);
    verts.push(L.x,0.05,L.z, R.x,0.05,R.z);
    uvs.push(0,t*80, 1,t*80);
    if(i<SEG){const b=i*2; idx.push(b,b+1,b+2,b+1,b+3,b+2);}
  }
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  geo.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));
  geo.setIndex(idx); geo.computeVertexNormals();
  scene.add(new THREE.Mesh(geo,new THREE.MeshStandardMaterial({color:0x2a2a2a,roughness:.9})));

  // Road markings
  const mkV=[];
  for(let i=0;i<=SEG;i++){
    const t=i/SEG;
    if(Math.floor(t*200)%3===0){
      const p=curve.getPointAt(t);
      mkV.push(p.x,0.08,p.z);
    }
  }
  if(mkV.length>1){
    const lg=new THREE.BufferGeometry();
    lg.setAttribute('position',new THREE.Float32BufferAttribute(mkV,3));
    scene.add(new THREE.Line(lg,new THREE.LineBasicMaterial({color:0xffffff,opacity:.4,transparent:true})));
  }

  // Barriers
  for(const side of[-1,1]){
    const bv=[],bi=[],bc=[];
    for(let i=0;i<=SEG;i++){
      const t=i/SEG, p=curve.getPointAt(t), tan=curve.getTangentAt(t);
      const right=new THREE.Vector3().crossVectors(tan,new THREE.Vector3(0,1,0)).normalize();
      const base=p.clone().addScaledVector(right,(W/2+.5)*side);
      bv.push(base.x,0,base.z, base.x,.9,base.z);
      const r=Math.floor(t*100)%2===0;
      bc.push(r?.9:1,r?.1:1,r?.1:1, r?.9:1,r?.1:1,r?.1:1);
      if(i<SEG){const b=i*2;bi.push(b,b+1,b+2,b+1,b+3,b+2);}
    }
    const bg=new THREE.BufferGeometry();
    bg.setAttribute('position',new THREE.Float32BufferAttribute(bv,3));
    bg.setAttribute('color',new THREE.Float32BufferAttribute(bc,3));
    bg.setIndex(bi); bg.computeVertexNormals();
    scene.add(new THREE.Mesh(bg,new THREE.MeshStandardMaterial({vertexColors:true,roughness:.5})));
  }

  // Start/finish
  const sp=curve.getPointAt(0), st=curve.getTangentAt(0);
  const sl=new THREE.Mesh(new THREE.PlaneGeometry(W,2.5),new THREE.MeshStandardMaterial({color:0xffffff,side:THREE.DoubleSide}));
  sl.position.copy(sp); sl.position.y=.07;
  sl.rotation.x=-Math.PI/2; sl.rotation.z=Math.atan2(st.x,st.z);
  scene.add(sl);
}

function buildEnvironment(scene, curve) {
  // Ground
  const g=new THREE.Mesh(new THREE.PlaneGeometry(1200,1200),new THREE.MeshStandardMaterial({color:0x1e4d14,roughness:1}));
  g.rotation.x=-Math.PI/2; g.position.y=0; scene.add(g);

  // Track edge grass strips
  const eg=new THREE.Mesh(new THREE.PlaneGeometry(1200,1200),new THREE.MeshStandardMaterial({color:0x2a6e1a,roughness:1}));
  eg.rotation.x=-Math.PI/2; eg.position.y=.01; scene.add(eg);

  // Trees
  const samples=[];
  for(let i=0;i<200;i++) samples.push(curve.getPointAt(i/200));
  function close(x,z,d=26){for(const p of samples){const dx=x-p.x,dz=z-p.z;if(dx*dx+dz*dz<d*d)return true;}return false;}

  const tMat=new THREE.MeshStandardMaterial({color:0x4a2e10});
  const lMat=new THREE.MeshStandardMaterial({color:0x1a5e14});
  const lMat2=new THREE.MeshStandardMaterial({color:0x227a1c});
  let c=0,tr=0;
  while(c<200&&tr<4000){
    tr++;
    const a=Math.random()*Math.PI*2, d=30+Math.random()*460;
    const x=Math.cos(a)*d, z=Math.sin(a)*d;
    if(close(x,z))continue; c++;
    const h=3+Math.random()*4;
    const trunk=new THREE.Mesh(new THREE.CylinderGeometry(.25,.45,h,6),tMat);
    trunk.position.set(x,h/2,z); scene.add(trunk);
    const lm=Math.random()>.5?lMat:lMat2;
    const leaves=new THREE.Mesh(new THREE.ConeGeometry(2+Math.random()*2,4+Math.random()*3,7),lm);
    leaves.position.set(x,h+2,z); scene.add(leaves);
  }

  // Grandstands near start
  const sp=curve.getPointAt(0), st=curve.getTangentAt(0);
  const right=new THREE.Vector3().crossVectors(st,new THREE.Vector3(0,1,0)).normalize();
  for(const s of[-1,1]){
    const base=sp.clone().addScaledVector(right,22*s);
    const stand=new THREE.Mesh(new THREE.BoxGeometry(30,8,6),new THREE.MeshStandardMaterial({color:0x223355,roughness:.7}));
    stand.position.copy(base); stand.position.y=4;
    scene.add(stand);
    // crowd dots
    for(let i=0;i<30;i++){
      const dot=new THREE.Mesh(new THREE.SphereGeometry(.4,4,4),new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(Math.random(),1,.5)}));
      dot.position.set(base.x+(Math.random()-.5)*28,6+Math.random()*3,base.z+(Math.random()-.5)*4);
      scene.add(dot);
    }
  }

  scene.background=new THREE.Color(0x6ab0de);
  scene.fog=new THREE.Fog(0x6ab0de,250,600);
}

// ══════════════════════════════════════════════
//  CAR MODEL
// ══════════════════════════════════════════════
function makeCar(color=0xe63946) {
  const car=new THREE.Group();
  const body=new THREE.MeshStandardMaterial({color,metalness:.6,roughness:.3});
  const dark=new THREE.MeshStandardMaterial({color:0x111111,metalness:.3,roughness:.4});
  const glass=new THREE.MeshStandardMaterial({color:0x88ccee,metalness:.8,roughness:.1,transparent:true,opacity:.6});
  const rubber=new THREE.MeshStandardMaterial({color:0x1a1a1a,roughness:.9});
  const add=(geo,mat,x,y,z)=>{const m=new THREE.Mesh(geo,mat);m.position.set(x,y,z);car.add(m);return m;};
  add(new THREE.BoxGeometry(2.4,.65,4.4),body,0,.55,0);
  add(new THREE.BoxGeometry(2,.5,2.2),dark,0,1.05,-.2);
  add(new THREE.BoxGeometry(1.9,.42,.1),glass,0,1.0,.8); // windshield
  for(const[x,y,z]of[[-1.25,.38,1.4],[1.25,.38,1.4],[-1.25,.38,-1.4],[1.25,.38,-1.4]]){
    const w=new THREE.Mesh(new THREE.CylinderGeometry(.38,.38,.32,12),rubber);
    w.rotation.z=Math.PI/2; w.position.set(x,y,z); car.add(w);
    const rim=new THREE.Mesh(new THREE.CylinderGeometry(.22,.22,.34,8),new THREE.MeshStandardMaterial({color:0xaaaaaa,metalness:.8}));
    rim.rotation.z=Math.PI/2; rim.position.set(x,y,z); car.add(rim);
  }
  // spoiler
  add(new THREE.BoxGeometry(2.2,.08,.55),dark,0,1.25,-1.95);
  [-0.75,0.75].forEach(x=>{add(new THREE.BoxGeometry(.08,.42,.08),dark,x,1.04,-1.95);});
  // lights
  const hlm=new THREE.MeshStandardMaterial({color:0xffffc0,emissive:0xffffc0,emissiveIntensity:.5});
  const tlm=new THREE.MeshStandardMaterial({color:0xff1111,emissive:0xff2200,emissiveIntensity:.4});
  [-0.75,0.75].forEach(x=>{
    add(new THREE.SphereGeometry(.14,7,7),hlm,x,.6,2.25);
    add(new THREE.BoxGeometry(.25,.12,.08),tlm,x,.6,-2.25);
  });
  return car;
}

// ══════════════════════════════════════════════
//  ITEM PICKUPS on track
// ══════════════════════════════════════════════
const ITEMS = ['boost','missile','shield','emp','oil','lightning'];
const ITEM_ICONS = {boost:'⚡',missile:'🚀',shield:'🛡️',emp:'💥',oil:'🛢️',lightning:'⚡⚡'};
const ITEM_NAMES = {boost:'Nitro Boost',missile:'Missile',shield:'Shield',emp:'EMP Burst',oil:'Oil Slick',lightning:'Lightning'};

function spawnItemPickups(scene, curve, count=20) {
  const boxes=[];
  for(let i=0;i<count;i++){
    const t=(i/count + .05) % 1;
    const pt=curve.getPointAt(t);
    const geo=new THREE.BoxGeometry(2,2,2);
    const mat=new THREE.MeshStandardMaterial({color:0xffdd00,emissive:0xffaa00,emissiveIntensity:.6,transparent:true,opacity:.85});
    const mesh=new THREE.Mesh(geo,mat);
    mesh.position.set(pt.x,.8,pt.z);
    mesh.userData={t,active:true,respawnAt:0};
    scene.add(mesh);
    // ring
    const ring=new THREE.Mesh(new THREE.TorusGeometry(1.4,.12,6,24),new THREE.MeshStandardMaterial({color:0xffffff,emissive:0xffffff,emissiveIntensity:.4}));
    ring.rotation.x=Math.PI/2; ring.position.set(pt.x,.8,pt.z);
    scene.add(ring);
    boxes.push({mesh,ring,t});
  }
  return boxes;
}

// ══════════════════════════════════════════════
//  SCENE SETUP
// ══════════════════════════════════════════════
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(65,window.innerWidth/window.innerHeight,.1,1000);

scene.add(new THREE.AmbientLight(0xffffff,.75));
const dir=new THREE.DirectionalLight(0xffffff,1.1);
dir.position.set(80,150,80); scene.add(dir);
scene.add(new THREE.HemisphereLight(0x87ceeb,0x2d5a1e,.45));

const curve=makeTrackCurve();
buildTrack(scene,curve);
buildEnvironment(scene,curve);

const TPTS=400;
const trkPts=Array.from({length:TPTS},(_,i)=>curve.getPointAt(i/TPTS));

const itemPickups=spawnItemPickups(scene,curve,24);

// Player car
const playerCar=makeCar(0x00e5ff);
scene.add(playerCar);
const p0=curve.getPointAt(0).clone();
const p0tan=curve.getTangentAt(0);
const p0angle=Math.atan2(p0tan.x,p0tan.z);
playerCar.position.copy(p0); playerCar.position.y=.35;
playerCar.rotation.set(0,p0angle,0);

// ══════════════════════════════════════════════
//  AI CARS
// ══════════════════════════════════════════════
const AI_COLORS=[0xff4655,0xffaa00,0x44ff88,0xcc44ff];
const NUM_AI=4;

function makeAI(idx) {
  const offset=(idx+1)/(NUM_AI+1);
  const startT=(offset*.08) % 1; // stagger start positions
  const pt=curve.getPointAt(startT);
  const tan=curve.getTangentAt(startT);
  const right=new THREE.Vector3().crossVectors(tan,new THREE.Vector3(0,1,0)).normalize();
  const laneOffset=(idx%2===0?-3:3);
  const car=makeCar(AI_COLORS[idx]);
  car.position.copy(pt);
  car.position.addScaledVector(right,laneOffset);
  car.position.y=.35;
  car.rotation.set(0,Math.atan2(tan.x,tan.z),0);
  scene.add(car);
  return {
    car, trackT:startT, speed:0,
    lap:1, crossedStart:false,
    item:null, shielded:false, spinTimer:0, slowTimer:0,
    stunTimer:0,
  };
}
const aiCars=Array.from({length:NUM_AI},(_,i)=>makeAI(i));

// ══════════════════════════════════════════════
//  PROJECTILES & EFFECTS
// ══════════════════════════════════════════════
const projectiles=[]; // {mesh, vel, owner, ttl}
const oilSlicks=[];   // {mesh, pos, ttl}
const empWaves=[];    // {mesh, owner, radius, maxR}

function fireMissile(fromPos, fromQuat, owner) {
  const geo=new THREE.SphereGeometry(.35,6,6);
  const mat=new THREE.MeshStandardMaterial({color:0xff6600,emissive:0xff3300,emissiveIntensity:1});
  const mesh=new THREE.Mesh(geo,mat);
  mesh.position.copy(fromPos); mesh.position.y=.8;
  const fwd=new THREE.Vector3(0,0,1).applyQuaternion(fromQuat).multiplyScalar(2.5);
  scene.add(mesh);
  projectiles.push({mesh,vel:fwd,owner,ttl:180});
}

function dropOil(pos) {
  const geo=new THREE.CylinderGeometry(2.5,2.5,.12,12);
  const mat=new THREE.MeshStandardMaterial({color:0x111111,roughness:1,transparent:true,opacity:.8});
  const mesh=new THREE.Mesh(geo,mat);
  mesh.position.copy(pos); mesh.position.y=.1;
  scene.add(mesh);
  oilSlicks.push({mesh,pos:pos.clone(),ttl:600});
}

function fireEMP(fromPos, owner) {
  const geo=new THREE.RingGeometry(.5,1,.5,20);
  const mat=new THREE.MeshStandardMaterial({color:0xffee00,emissive:0xffee00,emissiveIntensity:1,side:THREE.DoubleSide,transparent:true,opacity:.9});
  const mesh=new THREE.Mesh(geo,mat);
  mesh.position.copy(fromPos); mesh.position.y=.8;
  mesh.rotation.x=-Math.PI/2;
  scene.add(mesh);
  empWaves.push({mesh,owner,radius:1,maxR:28});
}

// ══════════════════════════════════════════════
//  PLAYER STATE
// ══════════════════════════════════════════════
const keys={};
window.addEventListener('keydown',e=>{keys[e.code]=true;e.preventDefault();});
window.addEventListener('keyup',  e=>{keys[e.code]=false;});

const player={
  speed:0, steer:0, trackIdx:0,
  lap:1, totalLaps:3, lapStartTime:0, currentLapTime:0,
  bestLap:Infinity, totalStartTime:0, totalTime:0,
  raceStarted:false, raceFinished:false, crossedStart:false,
  item:null, shielded:false,
  boostTimer:0, spinTimer:0, slowTimer:0, stunTimer:0,
  itemUsed:false,
};

function nearestIdx(pos, current) {
  let best=current, bd=Infinity;
  for(let d=-30;d<=30;d++){
    const i=((current+d)%TPTS+TPTS)%TPTS;
    const p=trkPts[i];
    const dx=pos.x-p.x, dz=pos.z-p.z;
    const dist=dx*dx+dz*dz;
    if(dist<bd){bd=dist;best=i;}
  }
  return best;
}

const camPos=new THREE.Vector3(), camLook=new THREE.Vector3();
function resetCamera(){
  const bk=new THREE.Vector3(0,0,-1).applyEuler(playerCar.rotation);
  camPos.copy(playerCar.position.clone().addScaledVector(bk,14).add(new THREE.Vector3(0,6,0)));
  camLook.copy(playerCar.position.clone().add(new THREE.Vector3(0,1.5,0)));
  camera.position.copy(camPos); camera.lookAt(camLook);
}
resetCamera();

// ══════════════════════════════════════════════
//  UPDATE PLAYER
// ══════════════════════════════════════════════
function updatePlayer(dt) {
  if(!player.raceStarted||player.raceFinished) return;
  if(player.stunTimer>0){player.stunTimer--;return;}

  const boosting = player.boostTimer>0;
  if(boosting) player.boostTimer--;

  const maxSpd = boosting ? 28 : (player.slowTimer>0 ? 7 : 20);
  if(player.slowTimer>0) player.slowTimer--;

  const accel=keys['ArrowUp']  ||keys['KeyW'];
  const brake=keys['ArrowDown']||keys['KeyS']||keys['Space']&&!player.item;
  const left =keys['ArrowLeft']||keys['KeyA'];
  const right=keys['ArrowRight']||keys['KeyD'];

  if(accel)      player.speed=Math.min(player.speed+.14,maxSpd);
  else if(brake) player.speed=Math.max(player.speed-.28,-4);
  else           player.speed+=player.speed>0?-Math.min(.05,player.speed):Math.min(.05,-player.speed);

  const sf=Math.min(Math.abs(player.speed)/4,1);
  if(left)       player.steer=Math.min(player.steer+.032*sf, .05);
  else if(right) player.steer=Math.max(player.steer-.032*sf,-.05);
  else           player.steer*=.82;

  if(player.spinTimer>0){player.spinTimer--;playerCar.rotateY(.15);player.speed*=.9;}
  else if(Math.abs(player.speed)>.01) playerCar.rotateY(player.steer*Math.sign(player.speed));

  const fwd=new THREE.Vector3(0,0,1).applyQuaternion(playerCar.quaternion);
  playerCar.position.addScaledVector(fwd,player.speed*.1);

  const prevIdx=player.trackIdx;
  player.trackIdx=nearestIdx(playerCar.position,player.trackIdx);
  playerCar.position.y=trkPts[player.trackIdx].y+.35;

  const tp=trkPts[player.trackIdx];
  const dx=playerCar.position.x-tp.x, dz=playerCar.position.z-tp.z;
  if(dx*dx+dz*dz>100){
    const d=Math.sqrt(dx*dx+dz*dz);
    playerCar.position.x-=(dx/d)*.5; playerCar.position.z-=(dz/d)*.5;
    player.speed*=.9;
  }

  // Lap detection
  if(prevIdx>TPTS*.85&&player.trackIdx<TPTS*.15){
    const now=performance.now(), lt=now-player.lapStartTime;
    if(player.crossedStart){
      if(lt<player.bestLap) player.bestLap=lt;
      if(player.lap>=player.totalLaps){
        player.raceFinished=true;
        player.totalTime=now-player.totalStartTime;
        endRace(); return;
      }
      player.lap++;
    }
    player.lapStartTime=now; player.crossedStart=true;
  }
  if(player.crossedStart) player.currentLapTime=performance.now()-player.lapStartTime;

  // Item use
  if(keys['Space']&&player.item&&!player.itemUsed){
    player.itemUsed=true;
    useItem(player.item,'player');
    player.item=null;
    setTimeout(()=>{player.itemUsed=false;},300);
    document.getElementById('item-box').classList.remove('has-item');
    document.getElementById('item-icon').textContent='❓';
    document.getElementById('item-name').textContent='No Item';
  }

  // Item pickups
  const now=performance.now();
  for(const pick of itemPickups){
    if(!pick.mesh.userData.active){
      if(now>pick.mesh.userData.respawnAt){
        pick.mesh.userData.active=true;
        pick.mesh.visible=true; pick.ring.visible=true;
      } continue;
    }
    const pp=pick.mesh.position;
    const ddx=playerCar.position.x-pp.x, ddz=playerCar.position.z-pp.z;
    if(ddx*ddx+ddz*ddz<9){
      pick.mesh.userData.active=false;
      pick.mesh.userData.respawnAt=now+8000;
      pick.mesh.visible=false; pick.ring.visible=false;
      if(!player.item){
        const it=ITEMS[Math.floor(Math.random()*ITEMS.length)];
        player.item=it;
        document.getElementById('item-box').classList.add('has-item');
        document.getElementById('item-icon').textContent=ITEM_ICONS[it];
        document.getElementById('item-name').textContent=ITEM_NAMES[it];
        showNotif('Got: '+ITEM_NAMES[it]);
      }
    }
  }

  // Chase camera
  const bk=new THREE.Vector3(0,0,-1).applyQuaternion(playerCar.quaternion);
  const ideal=playerCar.position.clone().addScaledVector(bk,14).add(new THREE.Vector3(0,6,0));
  camPos.lerp(ideal,.08); camera.position.copy(camPos);
  camLook.lerp(playerCar.position.clone().add(new THREE.Vector3(0,1.5,0)),.1);
  camera.lookAt(camLook);
}

// ══════════════════════════════════════════════
//  UPDATE AI
// ══════════════════════════════════════════════
function updateAI() {
  for(const ai of aiCars){
    if(ai.stunTimer>0){ai.stunTimer--;continue;}
    if(ai.spinTimer>0){ai.spinTimer--;ai.car.rotateY(.12);ai.speed*=.92;continue;}

    const maxSpd=ai.slowTimer>0?6:16+(Math.random()*.5); // slight variation
    if(ai.slowTimer>0) ai.slowTimer--;

    ai.trackT=(ai.trackT+(.0005+ai.speed*.00004))%1;
    const target=curve.getPointAt(ai.trackT);
    const dir=new THREE.Vector3(target.x-ai.car.position.x,0,target.z-ai.car.position.z).normalize();
    const fwd=new THREE.Vector3(0,0,1).applyQuaternion(ai.car.quaternion);
    const cross=fwd.clone().cross(dir).y;
    ai.car.rotateY(cross*.06);

    ai.speed=Math.min(ai.speed+.1,maxSpd);
    const mv=new THREE.Vector3(0,0,1).applyQuaternion(ai.car.quaternion);
    ai.car.position.addScaledVector(mv,ai.speed*.1);
    ai.car.position.y=target.y+.35;

    // AI random items
    if(Math.random()<.001&&!ai.item) ai.item=ITEMS[Math.floor(Math.random()*ITEMS.length)];
    if(ai.item&&Math.random()<.005){
      useItem(ai.item,'ai',ai);
      ai.item=null;
    }

    // AI item pickups
    const now=performance.now();
    for(const pick of itemPickups){
      if(!pick.mesh.userData.active) continue;
      const pp=pick.mesh.position;
      const ddx=ai.car.position.x-pp.x, ddz=ai.car.position.z-pp.z;
      if(ddx*ddx+ddz*ddz<12){
        pick.mesh.userData.active=false;
        pick.mesh.userData.respawnAt=now+8000;
        pick.mesh.visible=false; pick.ring.visible=false;
        if(!ai.item) ai.item=ITEMS[Math.floor(Math.random()*ITEMS.length)];
      }
    }
  }
}

// ══════════════════════════════════════════════
//  ITEM LOGIC
// ══════════════════════════════════════════════
function useItem(item, owner, aiRef) {
  const car=owner==='player'?playerCar:aiRef.car;
  const state=owner==='player'?player:aiRef;

  switch(item){
    case 'boost':
      state.boostTimer=90;
      if(owner==='player'){ flashOverlay('#effect-overlay',false); showNotif('NITRO BOOST!'); }
      break;
    case 'missile':
      fireMissile(car.position.clone(),car.quaternion,owner);
      break;
    case 'shield':
      state.shielded=true;
      setTimeout(()=>{state.shielded=false;},6000);
      if(owner==='player') showNotif('Shield Active!');
      break;
    case 'emp':
      fireEMP(car.position.clone(),owner);
      if(owner==='player') showNotif('EMP Fired!');
      break;
    case 'oil':
      dropOil(car.position.clone());
      if(owner==='player') showNotif('Oil Dropped!');
      break;
    case 'lightning':
      // zap all opponents
      if(owner==='player'){
        for(const ai of aiCars){ if(!ai.shielded){ai.slowTimer=180; ai.speed*=.3;} }
        flashOverlay('#effect-overlay',false);
        showNotif('⚡ Lightning! All slowed!');
      } else {
        if(!player.shielded){player.slowTimer=180; player.speed*=.3; flashEffect('hit');}
      }
      break;
  }
}

function applyHit(target) {
  if(target==='player'){
    if(player.shielded){player.shielded=false; showNotif('Shield absorbed hit!'); return;}
    player.spinTimer=40; player.speed*=.4;
    flashEffect('hit');
  } else {
    if(target.shielded){target.shielded=false; return;}
    target.spinTimer=40; target.speed*=.4;
  }
}

// ══════════════════════════════════════════════
//  UPDATE PROJECTILES & EFFECTS
// ══════════════════════════════════════════════
function updateProjectiles() {
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];
    p.mesh.position.add(p.vel);
    p.ttl--;
    if(p.ttl<=0){scene.remove(p.mesh);projectiles.splice(i,1);continue;}

    // collision check
    const pp=p.mesh.position;
    if(p.owner!=='player'){
      const dx=playerCar.position.x-pp.x, dz=playerCar.position.z-pp.z;
      if(dx*dx+dz*dz<4){ applyHit('player'); scene.remove(p.mesh); projectiles.splice(i,1); continue; }
    }
    for(const ai of aiCars){
      if(p.owner===ai) continue;
      const dx=ai.car.position.x-pp.x, dz=ai.car.position.z-pp.z;
      if(dx*dx+dz*dz<4){ applyHit(ai); scene.remove(p.mesh); projectiles.splice(i,1); break; }
    }
  }
}

function updateEMPs() {
  for(let i=empWaves.length-1;i>=0;i--){
    const e=empWaves[i];
    e.radius+=1.2;
    e.mesh.geometry.dispose();
    e.mesh.geometry=new THREE.RingGeometry(e.radius*.85,e.radius,6,24);
    e.mesh.material.opacity=.9*(1-e.radius/e.maxR);
    if(e.radius>=e.maxR){scene.remove(e.mesh);empWaves.splice(i,1);continue;}

    const ep=e.mesh.position;
    if(e.owner!=='player'){
      const dx=playerCar.position.x-ep.x,dz=playerCar.position.z-ep.z;
      const d=Math.sqrt(dx*dx+dz*dz);
      if(d<e.radius+1&&d>e.radius-2.5) applyHit('player');
    }
    for(const ai of aiCars){
      if(e.owner===ai) continue;
      const dx=ai.car.position.x-ep.x,dz=ai.car.position.z-ep.z;
      const d=Math.sqrt(dx*dx+dz*dz);
      if(d<e.radius+1&&d>e.radius-2.5) applyHit(ai);
    }
  }
}

function updateOil() {
  for(let i=oilSlicks.length-1;i>=0;i--){
    const o=oilSlicks[i];
    o.ttl--;
    if(o.ttl<=0){scene.remove(o.mesh);oilSlicks.splice(i,1);continue;}
    const op=o.pos;
    const dx=playerCar.position.x-op.x,dz=playerCar.position.z-op.z;
    if(dx*dx+dz*dz<8){player.spinTimer=50; player.speed*=.5; flashEffect('hit');}
    for(const ai of aiCars){
      const dx2=ai.car.position.x-op.x,dz2=ai.car.position.z-op.z;
      if(dx2*dx2+dz2*dz2<8){ai.spinTimer=50;ai.speed*=.5;}
    }
  }
}

// ══════════════════════════════════════════════
//  ITEM PICKUP ANIMATION
// ══════════════════════════════════════════════
function animatePickups(t) {
  for(const p of itemPickups){
    if(!p.mesh.userData.active) continue;
    p.mesh.rotation.y=t*.8;
    p.mesh.position.y=.8+Math.sin(t+p.t*100)*.2;
    p.ring.position.y=p.mesh.position.y;
    p.ring.rotation.z=t*.5;
  }
}

// ══════════════════════════════════════════════
//  RACE POSITION
// ══════════════════════════════════════════════
function calcPosition() {
  const playerScore=player.lap*TPTS+player.trackIdx;
  let pos=1;
  for(const ai of aiCars){
    const aiScore=ai.lap*TPTS+Math.floor(ai.trackT*TPTS);
    if(aiScore>playerScore) pos++;
  }
  return pos;
}

// ══════════════════════════════════════════════
//  MINIMAP
// ══════════════════════════════════════════════
const mmCanvas=document.getElementById('minimap');
const mmCtx=mmCanvas.getContext('2d');
const MM_SIZE=120, MM_SCALE=.22, MM_OX=60, MM_OY=60;

function drawMinimap() {
  mmCtx.clearRect(0,0,MM_SIZE,MM_SIZE);
  mmCtx.fillStyle='rgba(0,0,0,.6)';
  mmCtx.fillRect(0,0,MM_SIZE,MM_SIZE);

  // track path
  mmCtx.beginPath();
  for(let i=0;i<=TPTS;i++){
    const p=trkPts[i%TPTS];
    const x=MM_OX+p.x*MM_SCALE, y=MM_OY+p.z*MM_SCALE;
    i===0?mmCtx.moveTo(x,y):mmCtx.lineTo(x,y);
  }
  mmCtx.strokeStyle='rgba(255,255,255,.25)'; mmCtx.lineWidth=3; mmCtx.stroke();

  // AI dots
  for(const ai of aiCars){
    const x=MM_OX+ai.car.position.x*MM_SCALE, y=MM_OY+ai.car.position.z*MM_SCALE;
    mmCtx.beginPath(); mmCtx.arc(x,y,3,0,Math.PI*2);
    mmCtx.fillStyle='#ff4655'; mmCtx.fill();
  }

  // Player dot
  const px=MM_OX+playerCar.position.x*MM_SCALE, py=MM_OY+playerCar.position.z*MM_SCALE;
  mmCtx.beginPath(); mmCtx.arc(px,py,4.5,0,Math.PI*2);
  mmCtx.fillStyle='#00e5ff'; mmCtx.fill();
}

// ══════════════════════════════════════════════
//  HUD UPDATE
// ══════════════════════════════════════════════
function fmt(ms){
  if(!ms||ms===Infinity)return'--:--.---';
  const m=Math.floor(ms/60000),s=Math.floor((ms%60000)/1000),ms2=Math.floor(ms%1000);
  return`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(ms2).padStart(3,'0')}`;
}

function updateHUD() {
  const kmh=Math.round(Math.abs(player.speed)*15);
  document.getElementById('speed-val').textContent=kmh;
  const bar=document.getElementById('speed-bar');
  bar.style.width=Math.min(kmh/330,1)*100+'%';
  bar.style.background=kmh>264?'#ff4655':kmh>165?'#ffaa00':'#00e5ff';
  document.getElementById('h-lap').textContent=`${player.lap}/${player.totalLaps}`;
  document.getElementById('h-time').textContent=fmt(player.currentLapTime);
  document.getElementById('h-best').textContent=fmt(player.bestLap);
  const pos=calcPosition();
  document.getElementById('h-pos').textContent=pos;
  document.getElementById('h-postotal').textContent=`of ${NUM_AI+1}`;
}

// ══════════════════════════════════════════════
//  EFFECTS
// ══════════════════════════════════════════════
let effectTO=null;
function flashEffect(type){
  const el=document.getElementById('effect-overlay');
  if(effectTO) clearTimeout(effectTO);
  el.className=type; el.style.opacity='1';
  effectTO=setTimeout(()=>{el.style.opacity='0';},350);
}
function flashOverlay(sel,isEmp){
  const el=document.getElementById('effect-overlay');
  if(effectTO) clearTimeout(effectTO);
  el.className=isEmp?'emp':'';
  el.style.opacity='1';
  effectTO=setTimeout(()=>{el.style.opacity='0';},500);
}

let notifTO=null;
function showNotif(msg){
  const el=document.getElementById('item-notif');
  el.textContent=msg; el.classList.add('show');
  if(notifTO) clearTimeout(notifTO);
  notifTO=setTimeout(()=>el.classList.remove('show'),2200);
}

// ══════════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════════
let frame=0;
function loop(){
  requestAnimationFrame(loop);
  const t=frame/60; frame++;
  animatePickups(t);
  updatePlayer();
  updateAI();
  updateProjectiles();
  updateEMPs();
  updateOil();
  if(player.raceStarted&&!player.raceFinished){
    updateHUD();
    if(frame%2===0) drawMinimap();
  }
  renderer.render(scene,camera);
}
loop();

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// ══════════════════════════════════════════════
//  PHASE MANAGEMENT
// ══════════════════════════════════════════════
function showCountdown(cb){
  const el=document.getElementById('countdown');
  const val=document.getElementById('cdval');
  el.classList.add('active');
  let n=3; val.textContent=n; val.className='';
  const tick=()=>{
    n--;
    if(n===0){ val.textContent='GO!'; val.className='go'; setTimeout(()=>{el.classList.remove('active');cb();},600); }
    else { val.textContent=n; val.className=''; setTimeout(tick,1000); }
  };
  setTimeout(tick,1000);
}

function startRace(){
  document.getElementById('hud').classList.add('active');
  const now=performance.now();
  player.raceStarted=true;
  player.lapStartTime=now;
  player.totalStartTime=now;
}

function endRace(){
  document.getElementById('hud').classList.remove('active');
  const pos=calcPosition();
  document.getElementById('f-pos').textContent=`${pos} / ${NUM_AI+1}`;
  document.getElementById('f-total').textContent=fmt(player.totalTime);
  document.getElementById('f-best').textContent=fmt(player.bestLap);
  document.getElementById('finish-screen').classList.add('active');
}

function resetAll(){
  // reset player
  Object.assign(player,{
    speed:0,steer:0,trackIdx:0,lap:1,currentLapTime:0,
    bestLap:Infinity,raceStarted:false,raceFinished:false,
    crossedStart:false,totalTime:0,item:null,shielded:false,
    boostTimer:0,spinTimer:0,slowTimer:0,stunTimer:0,itemUsed:false,
  });
  playerCar.position.copy(p0); playerCar.position.y=.35;
  playerCar.rotation.set(0,p0angle,0);
  resetCamera();
  document.getElementById('item-box').classList.remove('has-item');
  document.getElementById('item-icon').textContent='❓';
  document.getElementById('item-name').textContent='No Item';

  // reset AI
  for(let i=0;i<aiCars.length;i++){
    const ai=aiCars[i];
    const offset=(i+1)/(NUM_AI+1);
    const startT=(offset*.08)%1;
    const pt=curve.getPointAt(startT);
    const tan=curve.getTangentAt(startT);
    const right=new THREE.Vector3().crossVectors(tan,new THREE.Vector3(0,1,0)).normalize();
    ai.car.position.copy(pt);
    ai.car.position.addScaledVector(right,i%2===0?-3:3);
    ai.car.position.y=.35;
    ai.car.rotation.set(0,Math.atan2(tan.x,tan.z),0);
    Object.assign(ai,{speed:0,trackT:startT,lap:1,crossedStart:false,item:null,shielded:false,spinTimer:0,slowTimer:0,stunTimer:0});
  }

  // reset projectiles/effects
  for(const p of projectiles) scene.remove(p.mesh);
  projectiles.length=0;
  for(const o of oilSlicks) scene.remove(o.mesh);
  oilSlicks.length=0;
  for(const e of empWaves) scene.remove(e.mesh);
  empWaves.length=0;

  // reset pickups
  for(const p of itemPickups){
    p.mesh.userData.active=true; p.mesh.visible=true; p.ring.visible=true;
  }
}

document.getElementById('start-btn').addEventListener('click',()=>{
  document.getElementById('start-screen').style.display='none';
  showCountdown(startRace);
});
document.getElementById('restart-btn').addEventListener('click',()=>{
  document.getElementById('finish-screen').classList.remove('active');
  resetAll();
  showCountdown(startRace);
});
</script>
</body>
</html>
