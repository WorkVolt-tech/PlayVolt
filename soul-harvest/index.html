<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soul Harvest — The Crimson Keep</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=IM+Fell+English:ital@0;1&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#060008; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; font-family:'IM Fell English',serif; overflow:hidden; color:#e8d5b7; }
  #wrap { position:relative; width:960px; max-width:100vw; }
  #titlebar { text-align:center; font-family:'Cinzel',serif; font-size:10px; color:#6a4a2a; letter-spacing:.3em; text-transform:uppercase; margin-bottom:4px; }
  #gc { position:relative; border:2px solid #2a0a1a; box-shadow:0 0 50px rgba(100,0,50,.5),inset 0 0 60px rgba(0,0,0,.9); overflow:hidden; }
  canvas { display:block; }
  #hud { display:flex; align-items:center; gap:14px; padding:5px 12px; background:linear-gradient(180deg,#0c0008,#160010); border-top:1px solid #2a0a1a; flex-wrap:wrap; }
  .hud-section { display:flex; align-items:center; gap:6px; }
  .hud-label { font-family:'Cinzel',serif; font-size:9px; color:#6a3a4a; letter-spacing:.15em; }
  .bar-bg { height:7px; background:#100008; border:1px solid #2a0a1a; border-radius:2px; overflow:hidden; }
  #hp-bar-bg { width:120px; } #xp-bar-bg { width:80px; }
  #hp-fill { height:100%; background:linear-gradient(90deg,#7a0020,#cc2244); transition:width .15s; }
  #xp-fill { height:100%; background:linear-gradient(90deg,#2244aa,#5588ff); transition:width .3s; }
  #souls-display { font-family:'Cinzel',serif; font-size:14px; color:#aa77cc; font-weight:700; }
  #level-display { font-family:'Cinzel',serif; font-size:12px; color:#e8c870; }
  #wave-display { font-family:'Cinzel',serif; font-size:10px; color:#7a5a3a; letter-spacing:.1em; }
  #controls { font-size:9px; color:#3a2a2a; letter-spacing:.08em; margin-left:auto; }
  #skillbar { display:flex; gap:5px; padding:5px 12px; background:#080006; border-top:1px solid #1e0814; justify-content:center; align-items:center; }
  .sk { width:54px; height:54px; border:1px solid #2a0a2a; background:#0e000c; border-radius:3px; position:relative; display:flex; align-items:center; justify-content:center; font-size:22px; cursor:pointer; transition:all .15s; overflow:hidden; user-select:none; }
  .sk.has { border-color:#7a3a8a; }
  .sk.has:hover { border-color:#cc88ff; box-shadow:0 0 14px rgba(160,80,220,.5); transform:translateY(-2px); }
  .sk.active { border-color:#ffcc44 !important; box-shadow:0 0 20px rgba(255,200,60,.8) !important; }
  .sk .sk-key { position:absolute; bottom:2px; right:3px; font-size:8px; color:#4a3a4a; font-family:'Cinzel',serif; }
  .sk .sk-name { position:absolute; top:1px; left:0; right:0; font-size:6px; text-align:center; color:#8a5a9a; font-family:'Cinzel',serif; white-space:nowrap; overflow:hidden; padding:0 2px; }
  .sk .sk-cost { position:absolute; bottom:2px; left:3px; font-size:7px; color:#7755aa; font-family:'Cinzel',serif; }
  .sk .cd-ov { position:absolute; inset:0; background:rgba(0,0,0,.78); display:flex; align-items:center; justify-content:center; font-size:10px; color:#9966bb; font-family:'Cinzel',serif; opacity:0; transition:opacity .1s; pointer-events:none; }
  .sk.cd .cd-ov { opacity:1; }
  #soul-panel { position:absolute; right:8px; top:8px; width:148px; background:rgba(8,0,12,.88); border:1px solid #3a1a3a; border-radius:4px; padding:8px; font-family:'Cinzel',serif; font-size:9px; color:#9a6aaa; letter-spacing:.08em; pointer-events:none; }
  #soul-panel h3 { font-size:10px; color:#cc88ff; margin-bottom:5px; letter-spacing:.2em; }
  .soul-entry { display:flex; align-items:center; gap:4px; margin-bottom:3px; }
  .soul-entry .se-icon { font-size:13px; }
  .soul-entry .se-bar { flex:1; height:4px; background:#1a0018; border-radius:2px; overflow:hidden; }
  .soul-entry .se-fill { height:100%; border-radius:2px; }
  .soul-entry .se-count { font-size:9px; color:#7a5a8a; min-width:16px; }
  #msg { position:absolute; top:44%; left:50%; transform:translate(-50%,-50%); font-family:'Cinzel',serif; font-size:26px; color:#e8c870; text-shadow:0 0 22px rgba(230,180,80,.9); letter-spacing:.2em; display:none; text-align:center; pointer-events:none; z-index:20; line-height:1.6; }
  #notif { position:absolute; bottom:58px; left:50%; transform:translateX(-50%); font-family:'Cinzel',serif; font-size:11px; color:#cc88ff; letter-spacing:.18em; opacity:0; transition:opacity .3s; pointer-events:none; z-index:15; white-space:nowrap; text-shadow:0 0 10px rgba(180,100,255,.6); }
  #boss-bar { position:absolute; top:8px; left:50%; transform:translateX(-50%); width:340px; display:none; }
  #boss-name { font-family:'Cinzel',serif; font-size:10px; color:#cc3355; letter-spacing:.2em; text-align:center; margin-bottom:3px; }
  #boss-hp-bg { height:8px; background:#1a0008; border:1px solid #440020; border-radius:2px; overflow:hidden; }
  #boss-hp-fill { height:100%; background:linear-gradient(90deg,#880020,#cc0033); transition:width .2s; }
  #lvlup { position:absolute; top:28%; left:50%; transform:translate(-50%,-50%); font-family:'Cinzel',serif; font-size:20px; color:#ffdd66; text-shadow:0 0 30px rgba(255,200,60,1); letter-spacing:.3em; opacity:0; pointer-events:none; z-index:25; transition:opacity .4s; }
  #soul-choose { position:absolute; inset:0; background:rgba(0,0,0,.85); display:none; align-items:center; justify-content:center; z-index:30; flex-direction:column; gap:10px; }
  #soul-choose h2 { font-family:'Cinzel',serif; font-size:16px; color:#cc88ff; letter-spacing:.3em; }
  #soul-choose-options { display:flex; gap:10px; }
  .sc-opt { width:92px; height:96px; border:1px solid #5a2a6a; background:#12000e; border-radius:5px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:5px; cursor:pointer; transition:all .2s; font-family:'Cinzel',serif; }
  .sc-opt:hover { border-color:#cc88ff; box-shadow:0 0 18px rgba(180,80,255,.5); transform:translateY(-3px); }
  .sc-opt .sc-icon { font-size:28px; }
  .sc-opt .sc-name { font-size:8px; color:#aa77cc; letter-spacing:.1em; text-align:center; }
  .sc-opt .sc-desc { font-size:7px; color:#6a4a7a; text-align:center; padding:0 4px; }
  #heal-hint { position:absolute; bottom:8px; left:8px; font-family:'Cinzel',serif; font-size:8px; color:#3a2a3a; letter-spacing:.1em; }
</style>
</head>
<body>
<div id="wrap">
  <div id="titlebar">☩ Soul Harvest — The Crimson Keep ☩</div>
  <div id="gc">
    <canvas id="canvas" width="960" height="390"></canvas>
    <div id="soul-panel"><h3>⚗ SOULS</h3><div id="soul-entries"></div></div>
    <div id="boss-bar"><div id="boss-name"></div><div id="boss-hp-bg"><div id="boss-hp-fill"></div></div></div>
    <div id="msg"></div>
    <div id="notif"></div>
    <div id="lvlup">✦ LEVEL UP ✦</div>
    <div id="soul-choose">
      <h2>☩ ABSORB SOUL ☩</h2>
      <div id="soul-choose-options"></div>
      <div style="font-family:'Cinzel',serif;font-size:9px;color:#4a3a5a;margin-top:4px;letter-spacing:.15em;">ESC — take souls only</div>
    </div>
    <div id="heal-hint">H — Heal (costs 8🔮 souls)</div>
  </div>
  <div id="hud">
    <div class="hud-section"><span class="hud-label">HP</span><div class="bar-bg" id="hp-bar-bg"><div id="hp-fill" style="width:100%"></div></div><span id="hp-txt" style="font-size:9px;color:#8a3a4a;font-family:'Cinzel',serif">120/120</span></div>
    <div class="hud-section"><span class="hud-label">LVL</span><span id="level-display">1</span></div>
    <div class="hud-section"><span class="hud-label">XP</span><div class="bar-bg" id="xp-bar-bg"><div id="xp-fill" style="width:0%"></div></div></div>
    <div class="hud-section"><span>🔮</span><span id="souls-display">0</span><span style="font-size:8px;color:#5a4a6a;font-family:'Cinzel',serif">SOULS</span></div>
    <div class="hud-section"><span id="wave-display">WAVE 0</span></div>
    <div id="controls">A/D: Move &nbsp;·&nbsp; W/Space: Jump &nbsp;·&nbsp; J: Attack &nbsp;·&nbsp; K: Dash &nbsp;·&nbsp; 1-5: Skills &nbsp;·&nbsp; H: Heal &nbsp;·&nbsp; R: Restart</div>
  </div>
  <div id="skillbar">
    <div class="sk" id="sl0"><span class="sk-name">empty</span><span>—</span><span class="sk-key">1</span><span class="sk-cost"></span><div class="cd-ov"></div></div>
    <div class="sk" id="sl1"><span class="sk-name">empty</span><span>—</span><span class="sk-key">2</span><span class="sk-cost"></span><div class="cd-ov"></div></div>
    <div class="sk" id="sl2"><span class="sk-name">empty</span><span>—</span><span class="sk-key">3</span><span class="sk-cost"></span><div class="cd-ov"></div></div>
    <div class="sk" id="sl3"><span class="sk-name">empty</span><span>—</span><span class="sk-key">4</span><span class="sk-cost"></span><div class="cd-ov"></div></div>
    <div class="sk" id="sl4"><span class="sk-name">empty</span><span>—</span><span class="sk-key">5</span><span class="sk-cost"></span><div class="cd-ov"></div></div>
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const VW = canvas.width, VH = canvas.height;
const WORLD_W = 2400;
const GROUND = 350;

// ── camera ────────────────────────────────────────
const cam = { x: 0 };
function worldToScreen(wx) { return wx - cam.x; }
function updateCam() {
  const target = player.x - VW / 2;
  cam.x = Math.max(0, Math.min(WORLD_W - VW, target));
}

// ── utils ──────────────────────────────────────────
let flashAlpha = 0, flashColor = '#fff';
let particles = [], floatTexts = [], soulOrbs = [], projectiles = [];
let shake = { x: 0, y: 0, t: 0 };

function flash(c, a, sh = 0) { flashColor = c; flashAlpha = a; if (sh > 0) shake.t = sh; }
function addPart(wx, y, col, n = 6, spd = 3) {
  for (let i = 0; i < n; i++)
    particles.push({ wx, y, vx: (Math.random() - .5) * spd, vy: (Math.random() - .5) * spd - 1.5, col, life: 28 + Math.random() * 18, size: 1.5 + Math.random() * 2.5 });
}
function floatTxt(wx, y, t, col) { floatTexts.push({ wx, y, t, col, life: 55, vy: -1.1 }); }
let notifTimer = null;
function notif(msg) {
  const e = document.getElementById('notif'); e.textContent = msg; e.style.opacity = 1;
  clearTimeout(notifTimer); notifTimer = setTimeout(() => e.style.opacity = 0, 2600);
}
function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax - aw / 2 < bx + bw / 2 && ax + aw / 2 > bx - bw / 2 &&
         ay - ah / 2 < by + bh / 2 && ay + ah / 2 > by - bh / 2;
}

// ── soul definitions ──────────────────────────────
const SOULS = [
  { id: 'bat',      name: 'Bat Swarm',       icon: '🦇', col: '#8844bb', cost: 3, cd: 4500, xp: 8,  desc: 'Bats hit all visible enemies',
    use(g, px, py) { let hit = 0; g.enemies.forEach(e => { if (!e.dead) { const d = 20 + g.spellPow; e.hit(d); floatTxt(e.wx, e.y - 26, '-' + d, '#bb66ff'); hit++; } }); if (hit > 0) { flash('#220044', .4); addPart(px, py, '#8844bb', 16, 5); } else notif('No enemies!'); } },
  { id: 'bone',     name: 'Bone Spike',      icon: '🦴', col: '#ccaa77', cost: 2, cd: 2000, xp: 5,  desc: '3 bone spikes forward',
    use(g, px, py, dir) { for (let i = -1; i <= 1; i++) projectiles.push({ wx: px + dir * 30, y: py + i * 14, vx: dir * 9, vy: i * .4, dmg: 32 + g.spellPow, col: '#ddbb88', r: 6, life: 80, trail: [] }); addPart(px, py, '#ccaa77', 10, 4); } },
  { id: 'ghost',    name: 'Wraith Form',     icon: '👻', col: '#aaccff', cost: 4, cd: 7000, xp: 10, desc: 'Invincible for 2.5s',
    use(g, px, py) { g.player.wraith = true; g.player.iframes = 2600; flash('#002244', .4); addPart(px, py, '#aaccff', 20, 4); setTimeout(() => g.player.wraith = false, 2600); } },
  { id: 'blood',    name: 'Blood Nova',      icon: '🩸', col: '#cc0033', cost: 5, cd: 9000, xp: 15, desc: 'Ring of blood projectiles',
    use(g, px, py) { for (let a = 0; a < 12; a++) { const ang = (a / 12) * Math.PI * 2; projectiles.push({ wx: px, y: py, vx: Math.cos(ang) * 9, vy: Math.sin(ang) * 9, dmg: 38 + g.spellPow, col: '#cc0033', r: 7, life: 45, trail: [] }); } flash('#440000', .6, 8); addPart(px, py, '#cc0033', 20, 6); } },
  { id: 'shadow',   name: 'Shadow Step',     icon: '🌑', col: '#334466', cost: 2, cd: 3000, xp: 6,  desc: 'Teleport behind nearest enemy',
    use(g, px, py) { const alive = g.enemies.filter(e => !e.dead); if (!alive.length) { notif('No enemies!'); return; } const t = alive.reduce((a, b) => Math.abs(a.wx - px) < Math.abs(b.wx - px) ? a : b); g.player.x = t.wx + (t.wx < px ? 50 : -50); addPart(g.player.x, g.player.y, '#334466', 14, 4); addPart(px, py, '#334466', 14, 4); flash('#001122', .35); } },
  { id: 'lightning',name: 'Chain Lightning', icon: '⚡', col: '#ffdd33', cost: 4, cd: 5500, xp: 12, desc: 'Strikes up to 5 enemies',
    use(g, px, py) { const chain = g.enemies.filter(e => !e.dead).slice(0, 5); if (!chain.length) { notif('No enemies!'); return; } chain.forEach((e, i) => { const d = Math.max(8, (38 + g.spellPow) - i * 6); e.hit(d); floatTxt(e.wx, e.y - 26, '-' + d, '#ffee55'); addPart(e.wx, e.y, '#ffdd33', 8, 4); projectiles.push({ wx: px, y: py, ex: e.wx, ey: e.y, vx: 0, vy: 0, dmg: 0, col: '#ffee55', r: 2, life: 12, trail: [], isLightning: true }); }); flash('#332200', .4); } },
  { id: 'ice',      name: 'Frost Nova',      icon: '❄️', col: '#88ddff', cost: 3, cd: 5000, xp: 9,  desc: 'Freeze enemies, +40% damage taken',
    use(g, px, py) { let hit = 0; g.enemies.filter(e => !e.dead).forEach(e => { e.frozen = 2500; e.hit(14 + g.spellPow); addPart(e.wx, e.y, '#aaddff', 10, 3); hit++; }); if (hit > 0) { flash('#002233', .3); addPart(px, py, '#88ddff', 16, 5); } else notif('No enemies!'); } },
  { id: 'skull',    name: 'Skull Barrage',   icon: '💀', col: '#aaaaaa', cost: 5, cd: 6500, xp: 14, desc: '5 skull projectiles',
    use(g, px, py, dir) { for (let i = 0; i < 5; i++) setTimeout(() => { projectiles.push({ wx: px, y: py - 10, vx: dir * (8 + Math.random() * 4), vy: (Math.random() - .5) * 4, dmg: 24 + g.spellPow, col: '#cccccc', r: 8, life: 60, isskull: true, trail: [] }); }, i * 110); addPart(px, py, '#aaaaaa', 12, 4); } },
  { id: 'drain',    name: 'Life Drain',      icon: '💜', col: '#882288', cost: 4, cd: 6000, xp: 11, desc: 'Drain life from all enemies',
    use(g, px, py) { let total = 0; g.enemies.filter(e => !e.dead).forEach(e => { const d = 18 + g.spellPow; e.hit(d); total += Math.floor(d * .5); projectiles.push({ wx: e.wx, y: e.y, ex: px, ey: py, vx: 0, vy: 0, dmg: 0, col: '#882288', r: 5, life: 16, trail: [], isDrain: true }); }); if (total > 0) { g.player.hp = Math.min(g.player.maxHp, g.player.hp + total); updateHP(); addPart(px, py, '#882288', 14, 4); flash('#330033', .3); } else notif('No enemies!'); } },
  { id: 'fire',     name: 'Hellfire',        icon: '🔥', col: '#ff6600', cost: 5, cd: 7500, xp: 13, desc: 'Burst of fire projectiles',
    use(g, px, py, dir) { for (let i = 0; i < 8; i++) setTimeout(() => { projectiles.push({ wx: px, y: py, vx: dir * (5 + Math.random() * 6), vy: -3 + Math.random() * 6, dmg: 30 + g.spellPow, col: '#ff5500', r: 8, life: 44, fire: true, trail: [] }); }, i * 70); flash('#440000', .5, 5); addPart(px, py, '#ff6600', 18, 5); } },
];
const soulInv = {};
SOULS.forEach(s => soulInv[s.id] = 0);

// ── platforms (world coords) ──────────────────────
const platforms = [
  { wx: 0,    y: GROUND, w: WORLD_W, h: 40 },
  { wx: 80,   y: 278, w: 120, h: 14 },
  { wx: 260,  y: 230, w: 100, h: 14 },
  { wx: 80,   y: 182, w: 80,  h: 14 },
  { wx: 220,  y: 160, w: 90,  h: 14 },
  { wx: 430,  y: 278, w: 120, h: 14 },
  { wx: 600,  y: 230, w: 100, h: 14 },
  { wx: 760,  y: 278, w: 120, h: 14 },
  { wx: 530,  y: 160, w: 80,  h: 14 },
  { wx: 680,  y: 190, w: 90,  h: 14 },
  { wx: 950,  y: 278, w: 120, h: 14 },
  { wx: 1100, y: 230, w: 100, h: 14 },
  { wx: 1260, y: 278, w: 120, h: 14 },
  { wx: 1000, y: 178, w: 80,  h: 14 },
  { wx: 1150, y: 160, w: 90,  h: 14 },
  { wx: 1450, y: 278, w: 120, h: 14 },
  { wx: 1600, y: 230, w: 100, h: 14 },
  { wx: 1760, y: 278, w: 120, h: 14 },
  { wx: 1500, y: 178, w: 80,  h: 14 },
  { wx: 1650, y: 160, w: 90,  h: 14 },
  { wx: 1950, y: 278, w: 120, h: 14 },
  { wx: 2100, y: 230, w: 100, h: 14 },
  { wx: 2000, y: 178, w: 80,  h: 14 },
  { wx: 2150, y: 155, w: 90,  h: 14 },
];

// ── background stars ──────────────────────────────
const stars = Array.from({ length: 200 }, () => ({
  wx: Math.random() * WORLD_W, y: Math.random() * 220,
  sz: Math.random() < .8 ? 1 : 2, sp: .5 + Math.random() * 2, off: Math.random() * Math.PI * 2
}));

// ── drawing helpers ───────────────────────────────
function drawTorch(sx, y) {
  ctx.fillStyle = '#3a2008'; ctx.fillRect(sx - 2, y, 4, 12);
  const fl = .7 + Math.sin(Date.now() * .003 + sx) * .3;
  ctx.save(); ctx.globalAlpha = fl * .5;
  const fg = ctx.createRadialGradient(sx, y, 0, sx, y, 13);
  fg.addColorStop(0, 'rgba(255,160,30,1)'); fg.addColorStop(1, 'rgba(255,60,0,0)');
  ctx.fillStyle = fg; ctx.beginPath(); ctx.arc(sx, y, 13, 0, Math.PI * 2); ctx.fill(); ctx.restore();
  ctx.fillStyle = `rgba(255,200,80,${fl})`; ctx.beginPath(); ctx.moveTo(sx - 3, y); ctx.quadraticCurveTo(sx, y - 9, sx + 3, y); ctx.fill();
}

function drawBg() {
  const g = ctx.createLinearGradient(0, 0, 0, VH);
  g.addColorStop(0, '#060008'); g.addColorStop(.6, '#0e0014'); g.addColorStop(1, '#040006');
  ctx.fillStyle = g; ctx.fillRect(0, 0, VW, VH);
  ctx.fillStyle = '#0a000f';
  for (let i = 0; i < Math.ceil(WORLD_W / 200) + 2; i++) {
    const sx = worldToScreen(i * 200);
    if (sx < -30 || sx > VW + 30) continue;
    ctx.fillRect(sx - 14, 0, 28, VH * .7); ctx.fillRect(sx - 18, 0, 36, 28); ctx.fillRect(sx - 16, 28, 32, 7);
  }
  const moonX = VW * .8;
  const mg = ctx.createRadialGradient(moonX, 55, 4, moonX, 55, 52);
  mg.addColorStop(0, 'rgba(225,215,195,.9)'); mg.addColorStop(.7, 'rgba(180,160,130,.25)'); mg.addColorStop(1, 'transparent');
  ctx.fillStyle = mg; ctx.beginPath(); ctx.arc(moonX, 55, 52, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(225,215,195,.82)'; ctx.beginPath(); ctx.arc(moonX, 55, 36, 0, Math.PI * 2); ctx.fill();
  const now = Date.now();
  for (const s of stars) {
    const sx = worldToScreen(s.wx);
    if (sx < -4 || sx > VW + 4) continue;
    const tw = .4 + Math.sin(now * .001 * s.sp + s.off) * .6;
    ctx.globalAlpha = tw * .7; ctx.fillStyle = '#fff'; ctx.fillRect(sx, s.y, s.sz, s.sz);
  }
  ctx.globalAlpha = 1;
}

function drawPlatform(p) {
  const sx = worldToScreen(p.wx);
  if (sx + p.w < 0 || sx > VW) return;
  ctx.fillStyle = '#180820'; ctx.fillRect(sx, p.y, p.w, p.h);
  ctx.fillStyle = '#2c1040'; ctx.fillRect(sx, p.y, p.w, 3);
  ctx.strokeStyle = '#0e0418'; ctx.lineWidth = 1;
  for (let i = 0; i < p.w; i += 28) { ctx.beginPath(); ctx.moveTo(sx + i, p.y); ctx.lineTo(sx + i, p.y + p.h); ctx.stroke(); }
  if (p.h === 14) { drawTorch(sx + 16, p.y - 14); drawTorch(sx + p.w - 16, p.y - 14); }
}

// ── collision ─────────────────────────────────────
function resolveGroundCollision(wx, y, w, h, vy) {
  let newY = y, newVY = vy, onGround = false;
  for (const p of platforms) {
    const el = wx - w / 2, er = wx + w / 2, eb = y + h / 2;
    const pl = p.wx, pr = p.wx + p.w, pt = p.y;
    if (er > pl && el < pr && vy >= 0 && eb >= pt && eb - vy <= pt + 4) {
      newY = pt - h / 2; newVY = 0; onGround = true; break;
    }
  }
  return { y: newY, vy: newVY, onGround };
}

const PLAYER_BASE_HP = 120;

  x: 200, y: GROUND - 40, w: 22, h: 36,
  vx: 0, vy: 0, dir: 1, onGround: false,
  hp: PLAYER_BASE_HP, maxHp: PLAYER_BASE_HP,
  atkCD: 0, dashCD: 0, dashing: false, dashDir: 1, dashT: 0,
  iframes: 0, wraith: false,
  atkBox: null, atkT: 0, combo: 0, comboT: 0,
  animT: 0, level: 1, xp: 0, xpNext: 30, souls: 0,
  dead: false, healCD: 0,

  takeDmg(d) {
    if (this.wraith || this.iframes > 0 || this.dead) return;
    this.hp = Math.max(0, this.hp - d);
    this.iframes = 700;
    floatTxt(this.x, this.y - 38, '-' + d, '#ff4444');
    addPart(this.x, this.y, '#cc2222', 8); flash('#330000', .45, 5);
    updateHP();
    if (this.hp <= 0) { this.hp = 0; this.dead = true; showMsg('YOU DIED\nPress R to restart'); }
  },

  heal(amount) {
    const cost = 8;
    if (this.souls < cost) { notif('Need 8🔮 to heal!'); return; }
    if (this.hp >= this.maxHp) { notif('Already at full HP!'); return; }
    if (this.healCD > 0) { notif('Heal on cooldown!'); return; }
    this.souls -= cost; this.hp = Math.min(this.maxHp, this.hp + amount);
    this.healCD = 4000;
    updateHP(); updateSouls();
    floatTxt(this.x, this.y - 40, '+' + amount, '#44ff88');
    addPart(this.x, this.y, '#44ff88', 14, 3); flash('#002200', .3);
    notif('✦ Restored ' + amount + ' HP');
  },

  gainXP(amount) {
    this.xp += amount;
    while (this.xp >= this.xpNext) {
      this.xp -= this.xpNext; this.level++; this.xpNext = Math.floor(this.xpNext * 1.4);
      this.maxHp += 15; this.hp = Math.min(this.maxHp, this.hp + 20); levelUpBanner();
    }
    updateXP();
  },

  update(dt) {
    if (this.dead) return;
    this.animT++;
    if (this.atkCD > 0) this.atkCD -= dt;
    if (this.dashCD > 0) this.dashCD -= dt;
    if (this.iframes > 0) this.iframes -= dt;
    if (this.comboT > 0) { this.comboT -= dt; if (this.comboT <= 0) this.combo = 0; }
    if (this.atkT > 0) { this.atkT -= dt; if (this.atkT <= 0) this.atkBox = null; }
    if (this.healCD > 0) this.healCD -= dt;
    for (let i = 0; i < 5; i++) if (game.skillCD[i] > 0) { game.skillCD[i] -= dt; updateSkillCD(i); }

    if (this.dashing) {
      this.dashT -= dt; this.vx = this.dashDir * 13; this.vy = 0;
      if (this.dashT <= 0) this.dashing = false;
    } else {
      const spd = 3.2;
      if (keys['a'] || keys['ArrowLeft']) { this.vx = -spd; this.dir = -1; }
      else if (keys['d'] || keys['ArrowRight']) { this.vx = spd; this.dir = 1; }
      else this.vx *= .75;
      if ((keys['w'] || keys['ArrowUp'] || keys[' ']) && this.onGround) {
        this.vy = -11; this.onGround = false; addPart(this.x, this.y + this.h / 2, '#9966aa', 4, 2);
      }
      if ((keys['k'] || keys['KeyK']) && this.dashCD <= 0) {
        this.dashing = true; this.dashDir = this.dir; this.dashT = 100; this.dashCD = 900;
        this.iframes = 100; addPart(this.x, this.y, '#334455', 10, 4); flash('#001122', .2);
      }
      if ((keys['j'] || keys['KeyJ']) && this.atkCD <= 0) this.attack();
    }

    this.vy += .5; this.vy = Math.min(this.vy, 13);
    this.x += this.vx; this.y += this.vy;
    this.x = Math.max(this.w / 2, Math.min(WORLD_W - this.w / 2, this.x));
    const res = resolveGroundCollision(this.x, this.y, this.w, this.h, this.vy);
    this.y = res.y; this.vy = res.vy; this.onGround = res.onGround;
    if (this.y + this.h / 2 > GROUND + this.h) { this.y = GROUND - this.h / 2; this.vy = 0; this.onGround = true; }
    if (this.y > VH + 80) { this.y = GROUND - 40; this.vy = 0; this.takeDmg(15); }
  },

  attack() {

// ── ENEMY CLASS ───────────────────────────────────
class Enemy {
  constructor(type, wx, y) {
    this.type = type; this.wx = wx; this.y = y;
    this.vx = 0; this.vy = 0; this.dir = -1; this.onGround = false;
    this.dead = false; this.deathT = 0; this.atkCD = 0; this.animT = 0; this.alertT = 0; this.frozen = 0;
    this.hp = type.hp; this.maxHp = type.hp;
    this.w = type.w || 22; this.h = type.h || 36; this.isBoss = type.isBoss || false;
  }
  hit(d) {
    if (this.dead) return;
    if (this.frozen > 0) d = Math.floor(d * 1.4);
    this.hp = Math.max(0, this.hp - d);
    addPart(this.wx, this.y, '#cc3333', 5, 3);
    if (this.hp <= 0) {
      this.hp = 0; this.dead = true; this.deathT = 50;
      addPart(this.wx, this.y, '#aa3333', 16, 5);
      soulOrbs.push({ wx: this.wx, y: this.y - 18, soul: this.type.soul, vy: -2.5, life: 360, pulse: 0 });
      if (this.isBoss) {
        for (let i = 0; i < 3; i++) soulOrbs.push({ wx: this.wx + (Math.random() - .5) * 50, y: this.y - 18, soul: SOULS[Math.floor(Math.random() * SOULS.length)], vy: -2 - Math.random() * 2.5, life: 360, pulse: 0 });
        document.getElementById('boss-bar').style.display = 'none';
        flash('#550000', .8, 14); notif('☩ BOSS SLAIN ☩');
      }
      player.gainXP(this.type.xp || 8);
    }
  }
  canReachPlayer() {
    return Math.abs(player.x - this.wx) < 72 && Math.abs(player.y - this.y) < 50;
  }
  update(dt) {
    if (this.dead) { this.deathT--; return; }
    this.animT++;
    if (this.atkCD > 0) this.atkCD -= dt;
    if (this.frozen > 0) { this.frozen -= dt; return; }
    const dx = player.x - this.wx, dist = Math.abs(dx);
    this.dir = dx > 0 ? 1 : -1;
    if (dist < 500) this.alertT = Math.min(this.alertT + 1, 30);
    if (this.alertT >= 30) {
      if (dist > 68) this.vx = this.dir * this.type.speed;
      else {
        this.vx *= .7;
        if (this.atkCD <= 0 && this.canReachPlayer()) { this.atkCD = this.type.atkRate; player.takeDmg(this.type.dmg); }
      }
    }
    if (this.type.flying) {
      const dy = player.y - this.y; this.vy = dy * .03;
      this.vx *= .88; if (this.alertT >= 30) this.vx = this.dir * this.type.speed;
    } else {
      this.vy += .5; this.vy = Math.min(this.vy, 13);
    }
    this.wx += this.vx; this.y += this.vy;
    this.wx = Math.max(this.w / 2, Math.min(WORLD_W - this.w / 2, this.wx));
    if (!this.type.flying) {
      const res = resolveGroundCollision(this.wx, this.y, this.w, this.h, this.vy);
      this.y = res.y; this.vy = res.vy; this.onGround = res.onGround;
      if (this.y + this.h / 2 > GROUND + this.h) { this.y = GROUND - this.h / 2; this.vy = 0; this.onGround = true; }
    }
    this.vx *= this.type.flying ? .9 : .82;
    if (this.isBoss) { const f = document.getElementById('boss-hp-fill'); if (f) f.style.width = (this.hp / this.maxHp * 100) + '%'; }
  }
  draw() {
    const sx = worldToScreen(this.wx);
    if (sx < -80 || sx > VW + 80) return;
    if (this.dead && this.deathT <= 0) return;
    ctx.save();
    ctx.globalAlpha = this.dead ? this.deathT / 50 : 1;
    if (this.frozen > 0) { ctx.fillStyle = 'rgba(100,200,255,.18)'; ctx.fillRect(sx - this.w / 2, this.y - this.h / 2, this.w, this.h); }
    const bob = Math.sin(this.animT * .11) * 1.5;
    ctx.translate(sx, this.y + bob); ctx.scale(this.dir, 1);
    this.type.draw(ctx, this);
    ctx.restore();
    if (!this.dead && this.hp < this.maxHp && !this.isBoss) {
      const bw = 40, bx = sx - bw / 2, by = this.y - this.h / 2 - 10;
      ctx.fillStyle = '#180008'; ctx.fillRect(bx, by, bw, 5);
      ctx.fillStyle = '#cc2244'; ctx.fillRect(bx, by, bw * (this.hp / this.maxHp), 5);
    }
  }
}

// ── GAME ──────────────────────────────────────────
const game = {
  enemies: [], wave: 0, waveT: 2500, spawnQ: [],
  equip: [null, null, null, null, null],
  skillCD: [0, 0, 0, 0, 0],
  spellPow: 0,

  useSkill(i) {
    const sk = this.equip[i]; if (!sk) return;
    if (this.skillCD[i] > 0) { notif('Cooling down…'); return; }
    if (player.souls < sk.cost) { notif('Need ' + sk.cost + '🔮 souls!'); return; }
    player.souls -= sk.cost; updateSouls();
    sk.use(this, player.x, player.y, player.dir);
    this.skillCD[i] = sk.cd;
    floatTxt(player.x, player.y - 55, sk.icon + ' ' + sk.name, sk.col);
    const el = document.getElementById('sl' + i); el.classList.add('active'); setTimeout(() => el.classList.remove('active'), 280);
  },

  spawnWave() {
    this.wave++;
    document.getElementById('wave-display').textContent = 'WAVE ' + this.wave;
    const types = [ET.skeleton, ET.bat, ET.ghost, ET.blood_knight, ET.necromancer, ET.gargoyle];
    const count = 2 + this.wave;
    for (let i = 0; i < count; i++) {
      const t = types[Math.floor(Math.random() * Math.min(types.length, 1 + Math.floor(this.wave / 2)))];
      const sx = Math.random() > .5 ? player.x + VW / 2 + 80 : player.x - VW / 2 - 80;
      const clampedX = Math.max(t.w / 2, Math.min(WORLD_W - t.w / 2, sx));
      this.spawnQ.push({ t, wx: clampedX, delay: i * 450 });
    }
    if (this.wave % 5 === 0) {
      const bx = player.x + VW * .5;
      this.spawnQ.push({ t: BOSS_TYPE, wx: Math.min(WORLD_W - 60, bx), delay: (count + 1) * 450 });
      setTimeout(() => {
        document.getElementById('boss-bar').style.display = 'block';
        document.getElementById('boss-name').textContent = '☩ THE CRIMSON WARDEN ☩';
        flash('#330000', .6, 10); notif('☩ A POWERFUL ENEMY APPROACHES ☩');
      }, (count + 1) * 450 + 600);
    }
    this.waveT = 0;
  },

  update(dt) {
    if (player.dead) return;
    player.update(dt);
    this.waveT += dt;
    this.spellPow = player.level * 5;
    for (const s of this.spawnQ) { s.delay -= dt; if (s.delay <= 0) { this.enemies.push(new Enemy(s.t, s.wx, GROUND - s.t.h / 2 - 2)); s.done = true; } }
    this.spawnQ = this.spawnQ.filter(s => !s.done);
    const alive = this.enemies.filter(e => !e.dead);
    if (alive.length === 0 && this.spawnQ.length === 0 && this.waveT > 2200) this.spawnWave();
    for (const e of this.enemies) e.update(dt);
    this.enemies = this.enemies.filter(e => !e.dead || e.deathT > 0);

    // melee hits
    if (player.atkBox) {
      const ab = player.atkBox;
      for (const e of this.enemies) {
        if (e.dead || ab.hit.has(e)) continue;
        if (rectsOverlap(ab.wx, ab.y, ab.w, ab.h, e.wx, e.y, e.w, e.h)) {
          e.hit(ab.dmg); floatTxt(e.wx, e.y - 32, '-' + ab.dmg, '#ffcc44'); ab.hit.add(e);
        }
      }
    }

    // projectiles
    for (const p of projectiles) {
      if (!p.isLightning && !p.isDrain) { p.wx += p.vx; p.y += p.vy; if (p.fire) p.vy += .12; }
      p.life--;
      if (p.trail) { p.trail.push({ wx: p.wx, y: p.y }); if (p.trail.length > 6) p.trail.shift(); }
      if (!p.isLightning && !p.isDrain) {
        for (const e of this.enemies) {
          if (e.dead) continue;
          if (Math.abs(e.wx - p.wx) < e.w / 2 + p.r && Math.abs(e.y - p.y) < e.h / 2 + p.r) {
            e.hit(p.dmg); floatTxt(e.wx, e.y - 30, '-' + p.dmg, '#cc88ff'); p.life = 0;
          }
        }
      }
      if (p.y > VH + 20) p.life = 0;
    }

    // soul orbs
    for (const o of soulOrbs) {
      o.vy += .15; o.y += o.vy; o.life--; o.pulse += .1;
      if (o.y > GROUND - 12) { o.vy *= -.45; o.y = GROUND - 12; }
      if (Math.abs(player.x - o.wx) < 34 && Math.abs(player.y - o.y) < 40) { this.collectSoul(o.soul); o.life = 0; addPart(o.wx, o.y, o.soul.col, 12, 4); }
    }

    // cleanup
    for (let i = particles.length - 1; i >= 0; i--) { particles[i].life--; if (particles[i].life <= 0) particles.splice(i, 1); else { particles[i].wx += particles[i].vx; particles[i].y += particles[i].vy; particles[i].vy += .08; } }
    for (let i = floatTexts.length - 1; i >= 0; i--) { floatTexts[i].y += floatTexts[i].vy; floatTexts[i].life--; if (floatTexts[i].life <= 0) floatTexts.splice(i, 1); }
    for (let i = soulOrbs.length - 1; i >= 0; i--) if (soulOrbs[i].life <= 0) soulOrbs.splice(i, 1);
    for (let i = projectiles.length - 1; i >= 0; i--) if (projectiles[i].life <= 0) projectiles.splice(i, 1);
    if (flashAlpha > 0) flashAlpha -= .03;
    if (shake.t > 0) { shake.t--; shake.x = (Math.random() - .5) * shake.t * .35; shake.y = (Math.random() - .5) * shake.t * .35; }
  },

  collectSoul(soul) {
    player.souls += soul.cost; updateSouls();
    soulInv[soul.id]++; updateSoulPanel();
    const alreadyHave = this.equip.some(s => s && s.id === soul.id);
    const hasEmpty = this.equip.some(s => s === null);
    if (alreadyHave) { player.gainXP(soul.xp || 5); notif(soul.icon + ' Already mastered — +' + soul.cost + '🔮'); return; }
    if (hasEmpty) showSoulChoice(soul);
    else { notif(soul.icon + ' Slots full! +' + soul.cost + '🔮'); player.gainXP(soul.xp || 5); }
  },

  draw() {
    ctx.save();
    if (shake.t > 0) ctx.translate(shake.x, shake.y);
    drawBg();
    for (const p of platforms) drawPlatform(p);

    // soul orbs
    for (const o of soulOrbs) {
      const sx = worldToScreen(o.wx); if (sx < -20 || sx > VW + 20) continue;
      const pu = Math.sin(o.pulse) * 4;
      const gr = ctx.createRadialGradient(sx, o.y, 0, sx, o.y, 16 + pu); gr.addColorStop(0, o.soul.col); gr.addColorStop(1, 'transparent');
      ctx.fillStyle = gr; ctx.beginPath(); ctx.arc(sx, o.y, 16 + pu, 0, Math.PI * 2); ctx.fill();
      ctx.font = '15px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(o.soul.icon, sx, o.y);
    }

    // projectiles
    for (const p of projectiles) {
      const sx = worldToScreen(p.wx); if (sx < -20 || sx > VW + 20) continue;
      ctx.save();
      if (p.isLightning) {
        const ex = worldToScreen(p.ex);
        ctx.strokeStyle = p.col; ctx.lineWidth = 2; ctx.shadowColor = p.col; ctx.shadowBlur = 8; ctx.globalAlpha = p.life / 12;
        ctx.beginPath(); ctx.moveTo(worldToScreen(player.x), player.y);
        const mx = (worldToScreen(player.x) + ex) * .5 + (Math.random() - .5) * 30, my = (player.y + p.ey) * .5 + (Math.random() - .5) * 30;
        ctx.quadraticCurveTo(mx, my, ex, p.ey); ctx.stroke();
      } else if (p.isDrain) {
        const ex = worldToScreen(p.ex);
        ctx.strokeStyle = p.col; ctx.lineWidth = 2; ctx.shadowColor = p.col; ctx.shadowBlur = 6; ctx.globalAlpha = p.life / 16;
        ctx.beginPath(); ctx.moveTo(sx, p.y); ctx.lineTo(ex, p.ey); ctx.stroke();
      } else {
        ctx.shadowColor = p.col; ctx.shadowBlur = 10; ctx.fillStyle = p.col;
        if (p.trail) for (let ti = 0; ti < p.trail.length; ti++) { ctx.globalAlpha = (ti / p.trail.length) * .4; ctx.beginPath(); ctx.arc(worldToScreen(p.trail[ti].wx), p.trail[ti].y, p.r * .5, 0, Math.PI * 2); ctx.fill(); }
        ctx.globalAlpha = 1;
        if (p.isskull) { ctx.font = (p.r * 2) + 'px serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText('💀', sx, p.y); }
        else { ctx.beginPath(); ctx.arc(sx, p.y, p.r, 0, Math.PI * 2); ctx.fill(); }
      }
      ctx.restore();
    }

    for (const e of this.enemies) e.draw();
    player.draw();

    // particles
    for (const p of particles) { const sx = worldToScreen(p.wx); if (sx < -10 || sx > VW + 10) continue; ctx.save(); ctx.globalAlpha = p.life / 30; ctx.fillStyle = p.col; ctx.beginPath(); ctx.arc(sx, p.y, p.size, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
    // float texts
    for (const f of floatTexts) { const sx = worldToScreen(f.wx); if (sx < -60 || sx > VW + 60) continue; ctx.save(); ctx.globalAlpha = Math.min(1, f.life / 40); ctx.fillStyle = f.col; ctx.font = 'bold 13px "Cinzel",serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(f.t, sx, f.y); ctx.restore(); }

    if (flashAlpha > 0) { ctx.save(); ctx.globalAlpha = flashAlpha; ctx.fillStyle = flashColor; ctx.fillRect(-20, -20, VW + 40, VH + 40); ctx.restore(); }
    ctx.restore();

    // combo text (screen space)
    if (player.combo > 0 && player.comboT > 0) { ctx.save(); ctx.font = 'bold 10px "Cinzel",serif'; ctx.fillStyle = '#ffcc44'; ctx.textAlign = 'left'; ctx.fillText(player.combo === 2 ? '⚡ HEAVY!' : 'COMBO x' + player.combo, worldToScreen(player.x) - 18, player.y - 52); ctx.restore(); }

    drawMinimap();
  }
};

// ── minimap ───────────────────────────────────────
function drawMinimap() {
  const mw = 120, mh = 16, mx = 8, my = VH - 24;
  ctx.fillStyle = 'rgba(0,0,0,.5)'; ctx.fillRect(mx, my, mw, mh);
  ctx.strokeStyle = '#3a1a3a'; ctx.lineWidth = 1; ctx.strokeRect(mx, my, mw, mh);
  const px = mx + Math.floor((player.x / WORLD_W) * mw);
  ctx.fillStyle = '#ffcc44'; ctx.fillRect(px - 2, my + 4, 4, 8);
  for (const e of game.enemies) { if (e.dead) continue; const ex = mx + Math.floor((e.wx / WORLD_W) * mw); ctx.fillStyle = e.isBoss ? '#ff0033' : '#cc3333'; ctx.fillRect(ex - 1, my + 5, 2, 6); }
  const cvx = mx + Math.floor((cam.x / WORLD_W) * mw);
  const cvw = Math.floor((VW / WORLD_W) * mw);
  ctx.strokeStyle = 'rgba(255,255,255,.2)'; ctx.strokeRect(cvx, my, cvw, mh);
}

// ── soul choose popup ─────────────────────────────
let gamePaused = false;
function showSoulChoice(soul) {
  gamePaused = true;
  const panel = document.getElementById('soul-choose');
  const opts = document.getElementById('soul-choose-options');
  opts.innerHTML = '';
  const learned = game.equip.filter(Boolean).map(s => s.id);
  const pool = SOULS.filter(s => s.id !== soul.id && !learned.includes(s.id));
  for (let i = pool.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [pool[i], pool[j]] = [pool[j], pool[i]]; }
  const choices = [soul, ...pool.slice(0, 2)];
  choices.forEach(sk => {
    const div = document.createElement('div'); div.className = 'sc-opt';
    div.innerHTML = `<div class="sc-icon">${sk.icon}</div><div class="sc-name">${sk.name}</div><div class="sc-desc">${sk.desc}</div>`;
    div.addEventListener('click', () => { learnSoul(sk); panel.style.display = 'none'; gamePaused = false; });
    opts.appendChild(div);
  });
  panel.style.display = 'flex';
}
function learnSoul(soul) {
  const slot = game.equip.findIndex(s => s === null); if (slot === -1) return;
  game.equip[slot] = soul; updateSkillBar();
  notif('✦ Learned: ' + soul.icon + ' ' + soul.name);
  player.gainXP(soul.xp || 5);
}
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && gamePaused) { document.getElementById('soul-choose').style.display = 'none'; gamePaused = false; notif('Soul absorbed — souls gained'); }
});

// ── HUD helpers ───────────────────────────────────
function updateHP() { document.getElementById('hp-fill').style.width = (Math.max(0, player.hp) / player.maxHp * 100) + '%'; document.getElementById('hp-txt').textContent = Math.max(0, Math.round(player.hp)) + '/' + player.maxHp; }
function updateXP() { document.getElementById('xp-fill').style.width = (player.xp / player.xpNext * 100) + '%'; document.getElementById('level-display').textContent = player.level; }
function updateSouls() { document.getElementById('souls-display').textContent = player.souls; }
function showMsg(t) { const e = document.getElementById('msg'); e.innerHTML = t.replace('\n', '<br>'); e.style.display = 'block'; }
function levelUpBanner() { const b = document.getElementById('lvlup'); b.style.opacity = 1; setTimeout(() => b.style.opacity = 0, 2200); notif('✦ LEVEL ' + player.level + ' — Max HP +15, Spell Power +5 ✦'); }
function updateSkillBar() {
  for (let i = 0; i < 5; i++) {
    const sk = game.equip[i], el = document.getElementById('sl' + i);
    el.innerHTML = sk ? `<span class="sk-name">${sk.name}</span><span>${sk.icon}</span><span class="sk-key">${i + 1}</span><span class="sk-cost">${sk.cost}🔮</span><div class="cd-ov"></div>` : `<span class="sk-name">empty</span><span>—</span><span class="sk-key">${i + 1}</span><span class="sk-cost"></span><div class="cd-ov"></div>`;
    el.classList.toggle('has', !!sk); el.style.boxShadow = sk ? `0 0 8px ${sk.col}55` : '';
  }
}
function updateSkillCD(i) {
  const el = document.getElementById('sl' + i), ov = el && el.querySelector('.cd-ov'), rem = game.skillCD[i];
  if (!ov) return;
  if (rem > 0) { el.classList.add('cd'); ov.textContent = (rem / 1000).toFixed(1) + 's'; }
  else { el.classList.remove('cd'); ov.textContent = ''; }
}
function updateSoulPanel() {
  const cont = document.getElementById('soul-entries'); cont.innerHTML = '';
  SOULS.filter(s => soulInv[s.id] > 0).forEach(s => {
    const div = document.createElement('div'); div.className = 'soul-entry';
    div.innerHTML = `<span class="se-icon">${s.icon}</span><div class="se-bar"><div class="se-fill" style="width:${Math.min(100, soulInv[s.id] * 25)}%;background:${s.col}"></div></div><span class="se-count">×${soulInv[s.id]}</span>`;
    cont.appendChild(div);
  });
}

// ── input ─────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key] = true; keys[e.code] = true;
  if (['1', '2', '3', '4', '5'].includes(e.key) && !gamePaused) game.useSkill(parseInt(e.key) - 1);
  if ((e.key === 'h' || e.key === 'H') && !gamePaused) player.heal(35);
  if ((e.key === 'r' || e.key === 'R') && player.dead) restart();
  if ([' ', 'ArrowUp', 'ArrowDown'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; keys[e.code] = false; });

// ── restart ───────────────────────────────────────
function restart() {
  Object.assign(player, { x: 200, y: GROUND - 40, vx: 0, vy: 0, dir: 1, onGround: false, hp: PLAYER_BASE_HP, maxHp: PLAYER_BASE_HP, atkCD: 0, dashCD: 0, dashing: false, iframes: 0, wraith: false, atkBox: null, atkT: 0, combo: 0, comboT: 0, animT: 0, level: 1, xp: 0, xpNext: 30, souls: 0, dead: false, healCD: 0 });
  SOULS.forEach(s => soulInv[s.id] = 0);
  game.enemies = []; game.wave = 0; game.waveT = 2500; game.spawnQ = [];
  game.equip = [null, null, null, null, null]; game.skillCD = [0, 0, 0, 0, 0]; game.spellPow = 0;
  particles.length = 0; floatTexts.length = 0; soulOrbs.length = 0; projectiles.length = 0;
  gamePaused = false; document.getElementById('soul-choose').style.display = 'none';
  document.getElementById('msg').style.display = 'none'; document.getElementById('boss-bar').style.display = 'none';
  document.getElementById('wave-display').textContent = 'WAVE 0';
  updateHP(); updateXP(); updateSouls(); updateSkillBar(); updateSoulPanel();
}

// ── game loop ─────────────────────────────────────
let last = 0;
function loop(ts) {
  const dt = Math.min(ts - last, 50); last = ts;
  if (!gamePaused) game.update(dt);
  updateCam();
  game.draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
