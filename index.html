<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PlayVolt — Game Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   PLAYVOLT — DESIGN TOKENS
═══════════════════════════════════════════ */
:root {
  --volt:       #d4ff00;    /* signature electric lime */
  --volt-dim:   #a8cc00;
  --volt-glow:  rgba(212,255,0,0.35);
  --ink:        #08080f;
  --ink2:       #12121e;
  --ink3:       #1c1c2e;
  --surface:    rgba(255,255,255,0.04);
  --surface2:   rgba(255,255,255,0.08);
  --border:     rgba(255,255,255,0.09);
  --border-hot: rgba(212,255,0,0.4);
  --text:       #f0f0ff;
  --muted:      #6b6b88;
  --danger:     #ff4d6d;
  --danger-dim: rgba(255,77,109,0.15);
  --success:    #39d98a;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  font-family: 'Nunito', sans-serif;
  background: var(--ink);
  color: var(--text);
  overflow-x: hidden;
}

/* ── NOISE TEXTURE OVERLAY ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

/* ── ANIMATED MESH BACKGROUND ── */
.bg-mesh {
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 70% 55% at 15% 20%, rgba(212,255,0,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 70% at 85% 80%, rgba(100,0,255,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 90% 40% at 50% 50%, rgba(0,200,255,0.03) 0%, transparent 70%);
  animation: meshShift 14s ease-in-out infinite alternate;
  z-index: 0;
}
@keyframes meshShift {
  0%   { opacity: 0.6; transform: scale(1); }
  100% { opacity: 1; transform: scale(1.04); }
}

/* ── GRID LINES ── */
.bg-grid {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(212,255,0,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(212,255,0,0.025) 1px, transparent 1px);
  background-size: 60px 60px;
  z-index: 0;
}

/* ─────────────────────────────────────────
   LAYOUT
───────────────────────────────────────── */
.shell {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px 40px;
}

/* ─────────────────────────────────────────
   LOGO
───────────────────────────────────────── */
.logo-wrap {
  text-align: center;
  margin-bottom: 32px;
  animation: logoIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes logoIn {
  from { opacity: 0; transform: translateY(-24px) scale(0.9); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.logo-mark {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 4px;
}
.logo-bolt {
  font-size: 2.4rem;
  filter: drop-shadow(0 0 16px var(--volt));
  animation: boltFlicker 3s ease-in-out infinite;
}
@keyframes boltFlicker {
  0%,90%,100% { filter: drop-shadow(0 0 16px var(--volt)); }
  93% { filter: drop-shadow(0 0 4px var(--volt)); opacity: 0.7; }
  96% { filter: drop-shadow(0 0 20px var(--volt)); }
}
.logo-text {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 3rem;
  letter-spacing: 3px;
  color: var(--volt);
  text-shadow: 0 0 30px var(--volt-glow), 0 0 60px rgba(212,255,0,0.15);
  line-height: 1;
}
.logo-tag {
  font-size: 0.72rem;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* ─────────────────────────────────────────
   CARD
───────────────────────────────────────── */
.card {
  width: 100%;
  max-width: 420px;
  background: var(--ink2);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 32px 28px;
  box-shadow:
    0 0 0 1px rgba(212,255,0,0.05),
    0 24px 60px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.05);
  animation: cardIn 0.55s cubic-bezier(0.34,1.56,0.64,1) 0.15s both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(28px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── TABS ── */
.tabs {
  display: flex;
  background: var(--ink3);
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 28px;
  border: 1px solid var(--border);
}
.tab {
  flex: 1;
  padding: 10px;
  background: none;
  border: none;
  border-radius: 9px;
  color: var(--muted);
  font-family: 'Nunito', sans-serif;
  font-size: 0.85rem;
  font-weight: 800;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.22s ease;
  text-transform: uppercase;
}
.tab.active {
  background: var(--volt);
  color: var(--ink);
  box-shadow: 0 2px 12px rgba(212,255,0,0.35);
}

/* ── PANELS ── */
.panel { display: none; }
.panel.active {
  display: block;
  animation: panelFade 0.3s ease both;
}
@keyframes panelFade {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── SECTION LABEL ── */
.field-label {
  display: block;
  font-size: 0.7rem;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
}

/* ── INPUTS ── */
.field-group { margin-bottom: 16px; position: relative; }
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

input[type="text"],
input[type="email"],
input[type="password"],
input[type="date"],
select {
  width: 100%;
  padding: 13px 16px;
  background: var(--ink3);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-size: 0.95rem;
  font-weight: 600;
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none;
  appearance: none;
}
input:focus, select:focus {
  outline: none;
  border-color: var(--volt);
  box-shadow: 0 0 0 3px rgba(212,255,0,0.12);
}
input::placeholder { color: var(--muted); font-weight: 600; }

/* date input calendar icon color */
input[type="date"]::-webkit-calendar-picker-indicator {
  filter: invert(0.4);
  cursor: pointer;
}

/* ── PASSWORD STRENGTH ── */
.pw-strength-bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 6px;
  overflow: hidden;
}
.pw-strength-fill {
  height: 100%;
  border-radius: 2px;
  width: 0%;
  transition: width 0.3s ease, background 0.3s ease;
}

/* ── DOB AGE BADGE ── */
.age-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 0.7rem;
  font-weight: 800;
  margin-top: 6px;
  opacity: 0;
  transform: translateY(-4px);
  transition: all 0.25s ease;
}
.age-badge.show { opacity: 1; transform: translateY(0); }
.age-badge.adult { background: rgba(57,217,138,0.15); color: var(--success); border: 1px solid rgba(57,217,138,0.3); }
.age-badge.minor { background: rgba(255,77,109,0.12); color: #ff8fa3; border: 1px solid rgba(255,77,109,0.25); }

/* ── ACCESS INFO BOX ── */
.access-info {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 20px;
  font-size: 0.82rem;
  color: var(--muted);
  line-height: 1.5;
  display: none;
}
.access-info.show { display: block; animation: panelFade 0.3s ease both; }
.access-info.adult-info { border-color: rgba(57,217,138,0.2); }
.access-info.minor-info { border-color: rgba(255,165,0,0.2); }
.access-info strong { color: var(--text); }

/* ── TERMS CHECKBOX ── */
.check-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 18px;
}
.check-row input[type="checkbox"] {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  margin-top: 2px;
  accent-color: var(--volt);
  cursor: pointer;
  border-radius: 4px;
}
.check-row label {
  font-size: 0.78rem;
  color: var(--muted);
  line-height: 1.5;
  cursor: pointer;
}
.check-row label a { color: var(--volt); text-decoration: none; }
.check-row label a:hover { text-decoration: underline; }

/* ── BUTTONS ── */
.btn {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 13px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.95rem;
  font-weight: 900;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.18s cubic-bezier(0.34,1.56,0.64,1);
  position: relative;
  overflow: hidden;
  margin-bottom: 10px;
}
.btn::after {
  content: '';
  position: absolute; inset: 0;
  background: rgba(255,255,255,0);
  transition: background 0.2s;
  border-radius: inherit;
}
.btn:hover::after { background: rgba(255,255,255,0.07); }
.btn:active { transform: scale(0.96) !important; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

.btn-volt {
  background: var(--volt);
  color: var(--ink);
  box-shadow: 0 4px 20px rgba(212,255,0,0.3);
}
.btn-volt:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(212,255,0,0.5);
}
.btn-ghost {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-ghost:hover:not(:disabled) { border-color: rgba(255,255,255,0.22); }

/* Shimmer on volt button */
.btn-volt::before {
  content: '';
  position: absolute;
  top: 0; left: -60%;
  width: 40%; height: 100%;
  background: rgba(255,255,255,0.3);
  transform: skewX(-20deg);
  animation: btnShine 3s ease-in-out infinite;
  pointer-events: none;
}
@keyframes btnShine {
  0%,65%,100% { left: -60%; opacity: 0; }
  45% { left: 130%; opacity: 1; }
}

/* ── DIVIDER ── */
.divider {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 18px 0;
  color: var(--muted);
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── ERROR / SUCCESS MESSAGES ── */
.msg {
  padding: 11px 14px;
  border-radius: 10px;
  font-size: 0.82rem;
  font-weight: 700;
  margin-bottom: 14px;
  display: none;
  animation: panelFade 0.25s ease;
}
.msg.show { display: block; }
.msg.error { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(255,77,109,0.3); }
.msg.success { background: rgba(57,217,138,0.1); color: var(--success); border: 1px solid rgba(57,217,138,0.3); }

/* ── FORGOT LINK ── */
.forgot-link {
  text-align: right;
  margin-bottom: 16px;
}
.forgot-link a {
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.2s;
}
.forgot-link a:hover { color: var(--volt); }

/* ── LOADING SPINNER ── */
.spinner {
  display: inline-block;
  width: 18px; height: 18px;
  border: 2px solid rgba(0,0,0,0.2);
  border-top-color: var(--ink);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-left: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── FOOTER ── */
.footer {
  margin-top: 24px;
  text-align: center;
  font-size: 0.72rem;
  color: var(--muted);
  line-height: 1.6;
  animation: cardIn 0.55s cubic-bezier(0.34,1.56,0.64,1) 0.25s both;
}
.footer a { color: var(--volt-dim); text-decoration: none; }
.footer a:hover { color: var(--volt); }

/* ── GAME HUB (shown after login) ── */
#hubView {
  display: none;
  width: 100%;
  max-width: 520px;
}
#hubView.active { display: block; animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }

.hub-header {
  text-align: center;
  margin-bottom: 28px;
}
.hub-greeting {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem;
  letter-spacing: 2px;
  color: var(--volt);
  text-shadow: 0 0 20px var(--volt-glow);
}
.hub-sub { font-size: 0.82rem; color: var(--muted); margin-top: 4px; }
.hub-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.68rem;
  font-weight: 800;
  letter-spacing: 0.5px;
  margin-top: 6px;
}
.hub-badge.adult { background: rgba(57,217,138,0.15); color: var(--success); border: 1px solid rgba(57,217,138,0.3); }
.hub-badge.minor { background: rgba(255,165,0,0.12); color: #ffb347; border: 1px solid rgba(255,165,0,0.3); }

.games-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  margin-bottom: 20px;
}
.game-card {
  background: var(--ink2);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 20px 14px;
  text-align: center;
  cursor: pointer;
  transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
  position: relative;
  overflow: hidden;
}
.game-card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--volt-glow) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.2s;
  border-radius: inherit;
}
.game-card:hover { transform: translateY(-5px); border-color: var(--border-hot); }
.game-card:hover::before { opacity: 1; }
.game-card:active { transform: scale(0.96); }
.game-card.locked { cursor: not-allowed; opacity: 0.5; }
.game-card.locked:hover { transform: none; border-color: var(--border); }
.game-card.locked:hover::before { opacity: 0; }
.game-card-static {
  border-style: dashed;
  opacity: 0.7;
}
.game-card-suggest {
  border-style: dashed;
  border-color: rgba(212,255,0,0.2);
  opacity: 0.85;
}
.game-card-suggest:hover { border-color: var(--volt) !important; opacity: 1; }

.game-icon { font-size: 2.4rem; margin-bottom: 8px; display: block; }
.game-name { font-size: 0.88rem; font-weight: 900; margin-bottom: 3px; }
.game-desc { font-size: 0.68rem; color: var(--muted); line-height: 1.3; }
.lock-chip {
  position: absolute;
  top: 8px; right: 8px;
  background: rgba(255,77,109,0.2);
  border: 1px solid rgba(255,77,109,0.35);
  border-radius: 8px;
  padding: 2px 6px;
  font-size: 0.58rem;
  font-weight: 900;
  color: var(--danger);
  letter-spacing: 0.5px;
}
.age-chip {
  position: absolute;
  top: 8px; right: 8px;
  border-radius: 8px;
  padding: 2px 6px;
  font-size: 0.58rem;
  font-weight: 900;
  letter-spacing: 0.5px;
}
.age-chip.adults-only {
  background: rgba(255,77,109,0.15);
  color: var(--danger);
  border: 1px solid rgba(255,77,109,0.3);
}
.age-chip.all-ages {
  background: rgba(57,217,138,0.12);
  color: var(--success);
  border: 1px solid rgba(57,217,138,0.25);
}

.hub-actions {
  display: flex;
  gap: 10px;
}
.hub-actions .btn { margin-bottom: 0; flex: 1; }

/* ── ACCESS TIER BADGE ── */
.tier-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 14px;
  margin-bottom: 18px;
}
.tier-label { font-size: 0.72rem; color: var(--muted); font-weight: 700; }
.tier-value { font-size: 0.8rem; font-weight: 900; color: var(--volt); }

/* ── FORGOT PASSWORD PANEL ── */
#forgotPanel {
  display: none;
  width: 100%;
  max-width: 420px;
  animation: cardIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}
#forgotPanel.active { display: block; }

/* ── ADMIN TOGGLE ── */
.admin-toggle {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--ink2);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 8px 16px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.72rem;
  font-weight: 800;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--muted);
  cursor: pointer;
  z-index: 100;
  transition: all 0.2s ease;
}
.admin-toggle:hover { border-color: var(--volt); color: var(--volt); }
.admin-toggle.on {
  background: rgba(212,255,0,0.1);
  border-color: var(--volt);
  color: var(--volt);
  box-shadow: 0 0 16px rgba(212,255,0,0.2);
}
.hub-badge.admin {
  background: rgba(212,255,0,0.15);
  color: var(--volt);
  border: 1px solid rgba(212,255,0,0.4);
}
/* ── ADMIN MODAL ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(4px);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: panelFade 0.2s ease;
}
.modal-overlay.hidden { display: none; }
.modal-box {
  background: var(--ink2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px 24px;
  width: 100%;
  max-width: 340px;
  box-shadow: 0 24px 60px rgba(0,0,0,0.6);
}
.modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  letter-spacing: 2px;
  color: var(--volt);
  text-align: center;
  margin-bottom: 6px;
}
.modal-sub { font-size: 0.78rem; color: var(--muted); text-align: center; margin-bottom: 20px; }
/* Responsive */
@media (max-width: 420px) {
  .card { padding: 24px 18px; border-radius: 18px; }
  .field-row { grid-template-columns: 1fr; gap: 0; }
  .games-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="bg-grid"></div>

<div class="shell">

  <!-- LOGO -->
  <div class="logo-wrap">
    <div class="logo-mark">
      <span class="logo-bolt">⚡</span>
      <span class="logo-text">PlayVolt</span>
    </div>
    <div class="logo-tag">Your Game Hub</div>
  </div>

  <!-- ══════════════════════════════
       GAME HUB (direct access)
  ══════════════════════════════ -->
  <div id="hubView">
    <div class="hub-header">
      <div class="hub-greeting" id="hubGreeting">Welcome!</div>
      <div class="hub-sub" id="hubSub">Pick a game and jump in.</div>
      <div class="hub-badge" id="hubBadge"></div>
    </div>

    <div class="tier-row">
      <span class="tier-label">🎮 Access Tier</span>
      <span class="tier-value" id="hubTier">Family Access</span>
    </div>

    <div class="games-grid" id="gamesGrid">
      <!-- Populated by JS -->
    </div>

    <div class="hub-actions">
      <button class="btn btn-volt" onclick="showToast('🛒 Store coming soon!')" style="margin-bottom:0;">🛒 Store</button>
    </div>
  </div>

  <div class="footer">
    &copy; 2025 PlayVolt &nbsp;·&nbsp; <a href="#">Privacy</a> &nbsp;·&nbsp; <a href="#">Terms</a>
  </div>

</div><!-- /shell -->

<!-- ADMIN MODAL -->
<div class="modal-overlay hidden" id="adminModal" onclick="if(event.target===this) closeAdminModal()">
  <div class="modal-box">
    <div class="modal-title">⚡ Admin Access</div>
    <div class="modal-sub">Enter the admin password to unlock adult games.</div>
    <div class="msg" id="adminMsg"></div>
    <div class="field-group">
      <label class="field-label">Password</label>
      <input type="password" id="adminPassword" placeholder="Admin password"
             onkeydown="if(event.key==='Enter') submitAdminPassword()">
    </div>
    <button class="btn btn-volt" onclick="submitAdminPassword()" style="margin-bottom:10px;">Unlock</button>
    <button class="btn btn-ghost" onclick="closeAdminModal()">Cancel</button>
  </div>
</div>

<!-- ADMIN TOGGLE BUTTON (fixed bottom-right) -->
<button class="admin-toggle" id="adminToggleBtn" onclick="handleAdminToggle()">🔒 Admin</button>

<!-- TOAST -->
<div id="toast" style="
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(120px);
  background:rgba(12,12,20,0.96);
  color:#fff;padding:12px 22px;border-radius:50px;
  z-index:9999;transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  border:1px solid var(--border);font-size:0.85rem;font-weight:700;
  white-space:nowrap;box-shadow:0 8px 30px rgba(0,0,0,0.4);
  font-family:'Nunito',sans-serif;
"></div>

<script>
/* ═══════════════════════════════════════════
   PLAYVOLT — DIRECT ACCESS (no auth)
   Admin mode unlocks adult games via password.
═══════════════════════════════════════════ */

// ── CHANGE THIS to your desired admin password ──
const ADMIN_PASSWORD = 'playvolt2025';

// ── GAME ROUTES ──
const GAME_ROUTES = {
  wtw_adult: '../PlayVolt/whos-the-worst-adult/index.html',
  wtw_kids:  '../PlayVolt/whos-the-worst/index.html',
  dominoes:  'dominoes/index.html',
  bluff:     'bluff/bluff.html',
};

// ── GAME CATALOGUE ──
const GAMES = [
  {
    id:      'wtw_adult',
    name:    "Who's The Worst?",
    icon:    '🔥',
    desc:    'The savage party voting game. Adults only.',
    access:  'adult',
    route:   GAME_ROUTES.wtw_adult,
  },
  {
    id:      'wtw_kids',
    name:    "Who's The Worst?",
    icon:    '🌟',
    desc:    'The fun, family-friendly voting game!',
    access:  'kids',
    route:   GAME_ROUTES.wtw_kids,
  },
  {
    id:      'dominoes',
    name:    "Dominoes Online",
    icon:    '🁣',
    desc:    'Classic block dominoes with friends. 4 players online!',
    access:  'all',
    route:   GAME_ROUTES.dominoes,
  },
  {
    id:      'bluff',
    name:    'Bluff',
    icon:    '🎭',
    desc:    'Social deduction party game. Find the imposter — 4–10 players!',
    access:  'all',
    route:   GAME_ROUTES.bluff,
  },

];

/* ═══════════════════════════════════════
   ADMIN STATE
   Stored in sessionStorage so it resets
   when the browser tab is closed.
═══════════════════════════════════════ */
function isAdminMode() {
  return sessionStorage.getItem('playvolt_admin') === '1';
}

function setAdminMode(on) {
  if (on) sessionStorage.setItem('playvolt_admin', '1');
  else     sessionStorage.removeItem('playvolt_admin');
}

/* ═══════════════════════════════════════
   ADMIN TOGGLE BUTTON
═══════════════════════════════════════ */
function handleAdminToggle() {
  if (isAdminMode()) {
    // Already on — clicking again turns it off
    setAdminMode(false);
    refreshHub();
    showToast('🔒 Admin mode off — family access restored.');
    updateAdminBtn();
  } else {
    // Not on — show password modal
    document.getElementById('adminModal').classList.remove('hidden');
    document.getElementById('adminPassword').value = '';
    clearMsg('adminMsg');
    setTimeout(() => document.getElementById('adminPassword').focus(), 100);
  }
}

function updateAdminBtn() {
  const btn = document.getElementById('adminToggleBtn');
  if (isAdminMode()) {
    btn.textContent = '⚡ Admin ON';
    btn.classList.add('on');
  } else {
    btn.textContent = '🔒 Admin';
    btn.classList.remove('on');
  }
}

/* ═══════════════════════════════════════
   ADMIN MODAL
═══════════════════════════════════════ */
function submitAdminPassword() {
  const pw = document.getElementById('adminPassword').value;
  if (pw === ADMIN_PASSWORD) {
    setAdminMode(true);
    closeAdminModal();
    refreshHub();
    showToast('⚡ Admin mode on — all games unlocked!');
    updateAdminBtn();
  } else {
    setMsg('adminMsg', 'Incorrect password. Try again.');
    document.getElementById('adminPassword').select();
  }
}

function closeAdminModal() {
  document.getElementById('adminModal').classList.add('hidden');
  clearMsg('adminMsg');
}

/* ═══════════════════════════════════════
   UI HELPERS
═══════════════════════════════════════ */
function showToast(msg, duration = 3200) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.transform = 'translateX(-50%) translateY(0)';
  setTimeout(() => { el.style.transform = 'translateX(-50%) translateY(120px)'; }, duration);
}

function setMsg(id, text, type = 'error') {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = text;
  el.className = `msg ${type} show`;
}
function clearMsg(id) {
  const el = document.getElementById(id);
  if (!el) return;
  el.className = 'msg';
  el.textContent = '';
}

/* ═══════════════════════════════════════
   HUB — BUILD + REFRESH
═══════════════════════════════════════ */
function refreshHub() {
  const admin = isAdminMode();

  // Update badge
  const badge = document.getElementById('hubBadge');
  if (admin) {
    badge.textContent = '⚡ Admin Mode';
    badge.className   = 'hub-badge admin';
  } else {
    badge.textContent = '🌟 Family Tier';
    badge.className   = 'hub-badge minor';
  }

  document.getElementById('hubTier').textContent = admin
    ? 'Adult + Family Access'
    : 'Family Access Only';

  buildGamesGrid(admin);
}

/* ═══════════════════════════════════════
   BUILD GAMES GRID
═══════════════════════════════════════ */
function buildGamesGrid(isAdult) {
  const grid = document.getElementById('gamesGrid');
  grid.innerHTML = '';

  GAMES.forEach(game => {
    const card = document.createElement('div');

    const locked = game.access === 'adult' && !isAdult;
    card.className = `game-card ${locked || game.comingSoon ? 'locked' : ''}`;

    let chipHTML = '';
    if (game.comingSoon) {
      chipHTML = `<div class="lock-chip">SOON</div>`;
    } else if (game.access === 'adult') {
      chipHTML = locked
        ? `<div class="lock-chip">🔒 18+</div>`
        : `<div class="age-chip adults-only">18+</div>`;
    } else {
      chipHTML = `<div class="age-chip all-ages">ALL AGES</div>`;
    }

    card.innerHTML = `
      ${chipHTML}
      <span class="game-icon">${game.icon}</span>
      <div class="game-name">${game.name}</div>
      <div class="game-desc">${game.desc}</div>
    `;

    if (!locked && !game.comingSoon && game.route) {
      card.onclick = () => launchGame(game);
    } else if (locked) {
      card.onclick = () => showToast('🔒 Enable Admin mode to access adult games.');
    } else if (game.comingSoon) {
      card.onclick = () => showToast(`🚧 ${game.name} is coming soon — stay tuned!`);
    }

    grid.appendChild(card);
  });

  // ── COMING SOON card ──
  const soonCard = document.createElement('div');
  soonCard.className = 'game-card game-card-static';
  soonCard.innerHTML = `
    <span class="game-icon">🚀</span>
    <div class="game-name">More Coming Soon</div>
    <div class="game-desc">New games dropping regularly. Stay tuned!</div>
  `;
  soonCard.onclick = () => showToast('🚧 More games on the way — watch this space!');
  grid.appendChild(soonCard);

  // ── SUGGEST A GAME card ──
  const suggestCard = document.createElement('div');
  suggestCard.className = 'game-card game-card-suggest';
  suggestCard.innerHTML = `
    <span class="game-icon">💡</span>
    <div class="game-name">Suggest a Game</div>
    <div class="game-desc">Got an idea? We'd love to hear it!</div>
  `;
  suggestCard.onclick = () => {
    const idea = prompt('What game would you like to see on PlayVolt?');
    if (idea && idea.trim()) showToast(`💡 Thanks! We got your idea: "${idea.trim().slice(0,40)}"`);
  };
  grid.appendChild(suggestCard);
}

/* ═══════════════════════════════════════
   LAUNCH GAME
═══════════════════════════════════════ */
function launchGame(game) {
  showToast(`🚀 Loading ${game.name}…`);
  // Pass admin flag to game pages via sessionStorage
  sessionStorage.setItem('playvolt_session', JSON.stringify({
    admin:       isAdminMode(),
    game_id:     game.id,
    launched_at: Date.now()
  }));
  setTimeout(() => {
    if (game.route) window.location.href = game.route;
    else showToast('Game URL not configured yet.');
  }, 600);
}

/* ── BOOT ── */
window.addEventListener('DOMContentLoaded', () => {
  refreshHub();
  updateAdminBtn();
  document.getElementById('hubGreeting').textContent = 'Welcome!';
});
</script>
</body>
</html>
