<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dekabess! — PlayVolt</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #0f0e0c;
  --surface:    #1a1814;
  --surface2:   #242118;
  --border:     #3a3528;
  --ivory:      #f0ead8;
  --ivory-dim:  #a09880;
  --gold:       #c9a84c;
  --gold-glow:  #e8c96a;
  --pip:        #1a1814;
  --red:        #c94c4c;
  --green:      #4caa6e;
  --pv-accent:  #7c5cfc;
  --pv-accent2: #a07aff;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--ivory);
  font-family: 'DM Mono', monospace;
  overflow-x: hidden;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%, rgba(201,168,76,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 80% 80%, rgba(124,92,252,0.05) 0%, transparent 50%),
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(58,53,40,0.25) 39px, rgba(58,53,40,0.25) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(58,53,40,0.25) 39px, rgba(58,53,40,0.25) 40px);
  pointer-events: none;
  z-index: 0;
}

.wrapper {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 520px;
}

.title-block { text-align: center; margin-bottom: 2.5rem; }

.domino-logo { display: inline-flex; gap: 4px; margin-bottom: 1.25rem; }
.domino-logo .tile {
  width: 34px; height: 60px; background: var(--ivory); border-radius: 5px;
  display: flex; flex-direction: column; align-items: center; justify-content: space-around;
  padding: 5px 4px; box-shadow: 0 4px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
  position: relative; animation: float 3s ease-in-out infinite;
}
.domino-logo .tile:nth-child(2) { animation-delay: 0.35s; }
.domino-logo .tile:nth-child(3) { animation-delay: 0.7s; }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
.domino-logo .tile::after {
  content: ''; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
  width: 90%; height: 1.5px; background: rgba(26,24,20,0.3);
}
.pip-row { display: flex; gap: 3px; align-items: center; justify-content: center; height: 22px; }
.pip { width: 5px; height: 5px; border-radius: 50%; background: var(--pip); }

h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.2rem, 8vw, 3.5rem); font-weight: 900; color: var(--ivory); letter-spacing: -0.02em; line-height: 1; text-shadow: 0 0 40px rgba(201,168,76,0.3); }
h1 span { color: var(--gold); }
.subtitle { font-size: 0.65rem; letter-spacing: 0.25em; color: var(--ivory-dim); text-transform: uppercase; margin-top: 0.4rem; }

/* ── MODE SELECTOR ── */
.mode-selector { margin: 1.25rem 0 0.5rem; }
.mode-label { font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ivory-dim); margin-bottom: 0.6rem; }
.mode-options { display: flex; flex-direction: column; gap: 0.5rem; }
.mode-btn {
  display: flex; align-items: center; gap: 0.75rem;
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 0.75rem 1rem; cursor: pointer;
  transition: all 0.18s; text-align: left; width: 100%; color: var(--ivory);
  font-family: 'DM Mono', monospace;
}
.mode-btn:hover { border-color: var(--gold); background: rgba(201,168,76,0.05); }
.mode-btn.selected { border-color: var(--gold); background: rgba(201,168,76,0.1); }
.mode-icon { font-size: 1.4rem; flex-shrink: 0; }
.mode-name { font-size: 0.78rem; font-weight: 600; letter-spacing: 0.05em; color: var(--ivory); }
.mode-desc { font-size: 0.6rem; color: var(--ivory-dim); margin-top: 2px; letter-spacing: 0.03em; }
.mode-ai { display: none; margin-top: 0.6rem; gap: 0.5rem; }
.mode-ai.visible { display: flex; }
.ai-btn {
  flex: 1; padding: 0.5rem; background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 6px; cursor: pointer; font-family: 'DM Mono', monospace;
  font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ivory-dim);
  transition: all 0.18s;
}
.ai-btn:hover { border-color: var(--gold); color: var(--ivory); }
.ai-btn.selected { border-color: var(--gold); background: rgba(201,168,76,0.1); color: var(--gold); }
.streak-board { display: flex; justify-content: space-around; margin: 0.75rem 0; }
.streak-pip { width: 18px; height: 18px; border-radius: 50%; background: var(--border); transition: all 0.3s; }
.streak-pip.won { background: var(--gold); box-shadow: 0 0 8px rgba(201,168,76,0.6); }

/* ── PLAYER LIST & PARTNER PICKER ── */
.players-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 0.75rem; }
.player-row {
  display: flex; align-items: center; justify-content: space-between;
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 8px 12px;
}
.player-row.is-me { border-color: rgba(201,168,76,0.4); }
.player-row-left { display: flex; align-items: center; gap: 8px; }
.player-row-name { font-size: 0.82rem; font-weight: 600; color: var(--ivory); }
.player-row-you { font-size: 0.58rem; color: var(--ivory-dim); }
.partner-btn {
  font-size: 0.6rem; font-weight: 700; letter-spacing: 0.06em;
  padding: 4px 10px; border-radius: 5px; cursor: pointer;
  border: 1.5px solid var(--border); background: transparent;
  color: var(--ivory-dim); transition: all 0.18s; white-space: nowrap;
}
.partner-btn:hover { border-color: var(--gold); color: var(--gold); }
.partner-btn.selected { border-color: var(--gold); background: rgba(201,168,76,0.15); color: var(--gold); }
.partner-btn.is-partner { border-color: var(--gold); background: rgba(201,168,76,0.12); color: var(--gold); }
.team-display { display: flex; gap: 8px; margin-bottom: 0.75rem; }
.team-box {
  flex: 1; border-radius: 8px; padding: 8px 10px; min-height: 52px;
}
.team-box.a { border: 1.5px solid rgba(201,168,76,0.4); background: rgba(201,168,76,0.06); color: var(--gold); }
.team-box.b { border: 1.5px solid rgba(100,180,255,0.4); background: rgba(100,180,255,0.06); color: #64b4ff; }
.team-box-label { font-size: 0.52rem; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.7; margin-bottom: 4px; }
.team-box-members { font-size: 0.78rem; font-weight: 600; }
.partner-hint { font-size: 0.62rem; color: var(--ivory-dim); text-align: center; margin-bottom: 0.6rem; }

label { font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ivory-dim); display: block; margin-bottom: 0.4rem; }
input[type="text"] {
  width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px;
  padding: 0.75rem 1rem; color: var(--ivory); font-family: 'DM Mono', monospace;
  font-size: 0.9rem; letter-spacing: 0.1em; transition: border-color 0.2s; outline: none;
}
input[type="text"]:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.1); }
input[type="text"]::placeholder { color: #4a4538; }
.input-group { display: flex; flex-direction: column; }

.tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 1.75rem; }
.tab { flex: 1; padding: 0.7rem; background: none; border: none; color: var(--ivory-dim); font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all 0.2s; }
.tab.active { color: var(--gold); border-bottom-color: var(--gold); }
.tab:hover:not(.active) { color: var(--ivory); }

.panel { display: none; flex-direction: column; gap: 1.25rem; animation: fadeUp 0.3s ease; }
.panel.active { display: flex; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.btn { padding: 0.875rem 1.5rem; border: none; border-radius: 4px; font-family: 'DM Mono', monospace; font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
.btn-primary { background: var(--gold); color: var(--bg); font-weight: 500; }
.btn-primary:hover { background: var(--gold-glow); transform: translateY(-1px); box-shadow: 0 6px 24px rgba(201,168,76,0.3); }
.btn-primary:active { transform: translateY(0); }
.btn-outline { background: transparent; color: var(--ivory); border: 1px solid var(--border); }
.btn-outline:hover { border-color: var(--ivory-dim); background: rgba(240,234,216,0.05); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

.room-code-display { background: var(--surface2); border: 1px solid var(--gold); border-radius: 4px; padding: 1.5rem; text-align: center; display: none; }
.room-code-display.visible { display: block; }
.room-code-label { font-size: 0.58rem; letter-spacing: 0.25em; color: var(--ivory-dim); text-transform: uppercase; margin-bottom: 0.5rem; }
.room-code-value { font-family: 'Playfair Display', serif; font-size: 2.4rem; font-weight: 700; color: var(--gold); letter-spacing: 0.3em; }
.share-url { font-size: 0.62rem; color: var(--ivory-dim); margin-top: 0.75rem; word-break: break-all; }
.copy-btn { display: inline-block; margin-top: 0.75rem; font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); cursor: pointer; border: none; background: none; font-family: 'DM Mono', monospace; text-decoration: underline; }

.waiting-room { display: none; flex-direction: column; gap: 1rem; }
.waiting-room.visible { display: flex; }
.players-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
.player-slot { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; padding: 1rem; display: flex; align-items: center; gap: 0.75rem; transition: border-color 0.3s; }
.player-slot.occupied { border-color: var(--green); }
.player-slot.me { border-color: var(--gold); }
.seat-number { width: 26px; height: 26px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 0.65rem; color: var(--ivory-dim); flex-shrink: 0; }
.player-slot.occupied .seat-number { background: var(--green); color: white; }
.player-slot.me .seat-number { background: var(--gold); color: var(--bg); }
.player-name { font-size: 0.72rem; color: var(--ivory); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.player-empty { font-size: 0.62rem; color: #3a3528; letter-spacing: 0.1em; }
.waiting-status { font-size: 0.62rem; letter-spacing: 0.15em; color: var(--ivory-dim); text-align: center; padding: 0.5rem; }
.pulse { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--gold); margin-right: 6px; animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.7); } }

.queue-status { background: var(--surface2); border: 1px dashed var(--border); border-radius: 4px; padding: 1.5rem; text-align: center; }
.queue-count { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--gold); display: block; margin: 0.5rem 0; }

.msg { font-size: 0.68rem; padding: 0.5rem 0.75rem; border-radius: 3px; display: none; }
.msg.error   { background: rgba(201,76,76,0.15);  color: var(--red);   border: 1px solid rgba(201,76,76,0.3);  display: block; }
.msg.success { background: rgba(76,170,110,0.15); color: var(--green); border: 1px solid rgba(76,170,110,0.3); display: block; }

hr { border: none; border-top: 1px solid var(--border); }

.conn-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--border); margin-right: 5px; transition: background 0.4s; }
.conn-dot.connected { background: var(--green); }
</style>
</head>
<body>

<div class="wrapper">
  <div class="title-block">
    <img src="dekabess_logo.webp" alt="Dekabess!" style="
      width: 220px;
      filter: drop-shadow(0 0 20px rgba(201,168,76,0.4));
      animation: float 3s ease-in-out infinite;
      margin-bottom: 0.5rem;
    ">
    <p class="subtitle">Block · 4 Players · Online</p>
  </div>

  <div id="lobby-content">
    <div class="input-group" style="margin-bottom:1.5rem">
      <label>Your Nickname</label>
      <input type="text" id="nickname" placeholder="Enter your name…" maxlength="16"/>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('create')">Create Room</button>
      <button class="tab" onclick="switchTab('join')">Join by Code</button>
      <button class="tab" onclick="switchTab('match')">Matchmaking</button>
    </div>

    <!-- Create Room -->
    <div class="panel active" id="panel-create">
      <div id="msg-create" class="msg"></div>
      <button class="btn btn-primary" id="btn-create" onclick="createRoom()">Create New Room</button>
      <div class="room-code-display" id="code-display">
        <div class="room-code-label">Room Code</div>
        <div class="room-code-value" id="display-code">------</div>
        <div class="share-url" id="display-url"></div>
        <button class="copy-btn" onclick="copyLink()">Copy Invite Link</button>
      </div>
      <div class="waiting-room" id="waiting-create">
        <div id="players-list-create"></div>
        <div class="waiting-status">
          <span class="conn-dot" id="conn-dot-create"></span>
          <span class="pulse"></span>Waiting for players…
        </div>
        <!-- Mode Selector — host only -->
        <div class="mode-selector" id="mode-selector" style="display:none;">
          <div class="mode-label">Game Mode</div>
          <div class="mode-options">
            <button class="mode-btn selected" onclick="selectMode('chien')" id="mode-chien">
              <span class="mode-icon">🐶</span>
              <div>
                <div class="mode-name">Chien Manjé Chien</div>
                <div class="mode-desc">Every man for himself · 4 players</div>
              </div>
            </button>
            <button class="mode-btn" onclick="selectMode('asosye')" id="mode-asosye">
              <span class="mode-icon">🤝</span>
              <div>
                <div class="mode-name">Asosyé</div>
                <div class="mode-desc">Partners · Teams of 2 · Seats 0&2 vs 1&3</div>
              </div>
            </button>
            <button class="mode-btn" onclick="selectMode('solo')" id="mode-solo">
              <span class="mode-icon">🤖</span>
              <div>
                <div class="mode-name">Solo vs AI</div>
                <div class="mode-desc">You vs 3 AI opponents · Every man for himself</div>
              </div>
            </button>
          </div>
          <div class="mode-ai" id="ai-difficulty">
            <div style="font-size:0.58rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--ivory-dim);margin-bottom:0.3rem;width:100%;">AI Difficulty</div>
            <button class="ai-btn selected" id="ai-beginner" onclick="selectAI('beginner')">🟢 Beginner</button>
            <button class="ai-btn" id="ai-hard" onclick="selectAI('hard')">🔴 Hard</button>
          </div>
        </div>
        <button class="btn btn-primary" id="btn-start" onclick="startGame()" disabled>Start Game (Need 4 Players)</button>
      </div>
    </div>

    <!-- Join by Code -->
    <div class="panel" id="panel-join">
      <div id="msg-join" class="msg"></div>
      <div class="input-group">
        <label>Room Code</label>
        <input type="text" id="join-code" placeholder="Enter 6-character code…" maxlength="6"
          oninput="this.value=this.value.toUpperCase()"
          onkeydown="if(event.key==='Enter')joinRoom()"/>
      </div>
      <button class="btn btn-primary" onclick="joinRoom()">Join Room</button>
      <div class="waiting-room" id="waiting-join">
        <div id="players-list-join"></div>
        <div class="waiting-status">
          <span class="conn-dot" id="conn-dot-join"></span>
          <span class="pulse"></span>Waiting for host to start…
        </div>
      </div>
    </div>

    <!-- Matchmaking -->
    <div class="panel" id="panel-match">
      <div id="msg-match" class="msg"></div>
      <div class="queue-status">
        <div style="font-size:0.62rem;letter-spacing:0.15em;color:var(--ivory-dim);text-transform:uppercase">Players in Queue</div>
        <span class="queue-count" id="queue-count">—</span>
        <div style="font-size:0.62rem;color:var(--ivory-dim)">Need 4 to auto-start</div>
      </div>
      <button class="btn btn-primary" id="btn-queue" onclick="joinQueue()">Join Matchmaking Queue</button>
      <button class="btn btn-outline" id="btn-leave-queue" onclick="leaveQueue()" style="display:none">Leave Queue</button>
      <div class="waiting-room" id="waiting-match">
        <div class="players-grid" id="players-match"></div>
        <div class="waiting-status"><span class="pulse"></span>Finding players…</div>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://eybzbtyfafmqbkulyvog.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV5YnpidHlmYWZtcWJrdWx5dm9nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4MjE0MDksImV4cCI6MjA5MDM5NzQwOX0.65mO6dICDWAlS4nh0gBs7tSNobuNMNo103YY0Ylccq8';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let myPlayerId = null, myRoomId = null, myRoomCode = null, mySeat = null;
let roomChannel = null, queueChannel = null;
let selectedMode = 'chien', selectedAIDiff = 'beginner', amHost = false;

function selectMode(mode) {
  selectedMode = mode;
  ['chien','asosye','solo'].forEach(m => {
    document.getElementById('mode-' + m).classList.toggle('selected', m === mode);
  });
  document.getElementById('ai-difficulty').classList.toggle('visible', mode === 'solo');
  // Re-render player list to show/hide partner picker
  selectedPartnerId = null;
  if (myRoomId) loadAndRenderPlayers(myRoomId, myPanel);
}

function selectAI(diff) {
  selectedAIDiff = diff;
  document.getElementById('ai-beginner').classList.toggle('selected', diff === 'beginner');
  document.getElementById('ai-hard').classList.toggle('selected', diff === 'hard');
}

function generateRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({ length: 6 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
}

function generateDominoSet() {
  const tiles = [];
  for (let a = 0; a <= 6; a++)
    for (let b = a; b <= 6; b++) tiles.push([a, b]);
  return tiles;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.addEventListener('load', () => {
  const saved = localStorage.getItem('domino_nickname') || '';
  document.getElementById('nickname').value = saved;
  document.getElementById('nickname').addEventListener('input', () => {
    localStorage.setItem('domino_nickname', document.getElementById('nickname').value.trim());
  });
  const code = new URLSearchParams(location.search).get('join');
  if (code) { switchTab('join'); document.getElementById('join-code').value = code.toUpperCase(); }
  loadQueueCount();
});

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) =>
    t.classList.toggle('active', ['create','join','match'][i] === tab));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'match') loadQueueCount();
}

function getNickname() {
  const v = document.getElementById('nickname').value.trim();
  if (!v) { alert('Please enter a nickname first!'); return null; }
  return v;
}

function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.textContent = text; el.className = 'msg ' + type;
}

function setConnected(panel, ok) {
  const dot = document.getElementById('conn-dot-' + panel);
  if (dot) dot.classList.toggle('connected', ok);
}

let _loadingPlayers = false;

// ── SEAT PICKER ──────────────────────────────────────────────────
async function loadAndRenderPlayers(roomId, panel) {
  if (_loadingPlayers) return;
  _loadingPlayers = true;
  try {
    const { data: players } = await db.from('domino_players').select('*')
      .eq('room_id', roomId).order('seat');
    renderPlayerList(panel, players || []);
    if (panel === 'create' && amHost) {
      const startBtn = document.getElementById('btn-start');
      const count = (players || []).filter(p => !p.is_ai).length;
      const isSolo = selectedMode === 'solo';
      startBtn.disabled = isSolo ? false : count < 4;
      startBtn.textContent = isSolo
        ? 'Start Solo Game'
        : count < 4 ? `Start Game (${count}/4 Players)` : 'Start Game!';
    }
  } finally { _loadingPlayers = false; }
}

let selectedPartnerId = null;  // ID of chosen partner (Asosyé only)

function renderPlayerList(panel, occupants) {
  const el = document.getElementById('players-list-' + panel);
  if (!el) return;
  el.innerHTML = '';

  const isAsosye = selectedMode === 'asosye';
  const meInRoom = occupants.find(p => p.id === myPlayerId);

  // ── Team display (Asosyé only) ───────────────────────────────
  if (isAsosye && occupants.length >= 2) {
    const teams = buildTeams(occupants);
    const teamDiv = document.createElement('div');
    teamDiv.className = 'team-display';
    teamDiv.innerHTML = `
      <div class="team-box a">
        <div class="team-box-label">🤝 Your Team</div>
        <div class="team-box-members">${teams.mine.map(p => escHtml(p.nickname)).join(' & ') || '—'}</div>
      </div>
      <div class="team-box b">
        <div class="team-box-label">⚔️ Opponents</div>
        <div class="team-box-members">${teams.other.map(p => escHtml(p.nickname)).join(' & ') || '—'}</div>
      </div>`;
    el.appendChild(teamDiv);
  }

  // ── Player rows ───────────────────────────────────────────────
  const listDiv = document.createElement('div');
  listDiv.className = 'players-list';

  if (occupants.length === 0) {
    listDiv.innerHTML = '<div style="color:var(--ivory-dim);font-size:0.75rem;text-align:center;padding:12px;">Waiting for players to join…</div>';
  }

  occupants.forEach(p => {
    const isMe = p.id === myPlayerId;
    const isPartner = isAsosye && p.id === selectedPartnerId;
    const row = document.createElement('div');
    row.className = 'player-row' + (isMe ? ' is-me' : '');

    let actionBtn = '';
    // Show "Pick as Partner" button in Asosyé mode for other players (not yourself)
    if (isAsosye && !isMe && meInRoom) {
      actionBtn = `<button class="partner-btn ${isPartner ? 'is-partner' : ''}"
        onclick="togglePartner('${p.id}')">${isPartner ? '🤝 Partner' : 'Pick Partner'}</button>`;
    }

    row.innerHTML = `
      <div class="player-row-left">
        <div class="player-row-name">${escHtml(p.nickname)}</div>
        ${isMe ? '<span class="player-row-you">(you)</span>' : ''}
      </div>
      ${actionBtn}`;
    listDiv.appendChild(row);
  });

  // Empty slots
  const emptyCount = 4 - occupants.length;
  for (let i = 0; i < emptyCount; i++) {
    const row = document.createElement('div');
    row.className = 'player-row';
    row.style.opacity = '0.4';
    row.innerHTML = '<div class="player-row-name" style="color:var(--ivory-dim)">Waiting…</div>';
    listDiv.appendChild(row);
  }

  el.appendChild(listDiv);

  // Partner hint
  if (isAsosye && meInRoom && !selectedPartnerId) {
    const hint = document.createElement('div');
    hint.className = 'partner-hint';
    hint.textContent = '👆 Pick your partner for Asosyé mode';
    el.appendChild(hint);
  }
}

function buildTeams(occupants) {
  // My team = me + my chosen partner
  // Other team = the other two
  const me = occupants.find(p => p.id === myPlayerId);
  if (!me) return { mine: occupants.slice(0,2), other: occupants.slice(2) };
  const partner = occupants.find(p => p.id === selectedPartnerId);
  const mine  = [me, partner].filter(Boolean);
  const other = occupants.filter(p => p.id !== myPlayerId && p.id !== selectedPartnerId);
  return { mine, other };
}

function togglePartner(id) {
  selectedPartnerId = (selectedPartnerId === id) ? null : id;
  loadAndRenderPlayers(myRoomId, myPanel);
}

async function claimSeat(seat) {
  // kept for compatibility but no longer used in partner mode
}

async function releaseSeat() {
  if (!myPlayerId || !myRoomId) return;
  await db.from('domino_players').delete().eq('id', myPlayerId);
  myPlayerId = null; mySeat = null; selectedPartnerId = null;
  await loadAndRenderPlayers(myRoomId, myPanel);
}

let myPanel = 'create';

async function createRoom() {
  const nickname = getNickname(); if (!nickname) return;
  const btn = document.getElementById('btn-create');
  btn.disabled = true; btn.textContent = 'Creating…';
  try {
    const code = generateRoomCode();
    const { data: room, error: rErr } = await db.from('domino_rooms')
      .insert({ code, status: 'waiting', current_turn: 0 }).select().single();
    if (rErr) throw rErr;

    myRoomId = room.id; myRoomCode = code; myPanel = 'create';
    // Host starts unseated — picks seat from the picker
    document.getElementById('display-code').textContent = code;
    const url = `${location.origin}${location.pathname}?join=${code}`;
    document.getElementById('display-url').textContent = url;
    document.getElementById('code-display').classList.add('visible');
    document.getElementById('waiting-create').classList.add('visible');
    document.getElementById('mode-selector').style.display = 'block';
    amHost = true;
    btn.style.display = 'none';
    // Host joins the room immediately as a player (seat assigned at game start)
    const nickname = getNickname();
    if (nickname) {
      const { data: player } = await db.from('domino_players')
        .insert({ room_id: room.id, seat: 0, nickname, hand: [], is_connected: true })
        .select().single();
      if (player) { myPlayerId = player.id; mySeat = 0; }
    }
    renderPlayerList('create', myPlayerId ? [{ id: myPlayerId, seat: 0, nickname: getNickname() || '' }] : []);
    subscribeToRoom(room.id, 'create');
  } catch (e) {
    showMsg('msg-create', 'Error: ' + e.message, 'error');
    btn.disabled = false; btn.textContent = 'Create New Room';
  }
}

function copyLink() {
  const url = `${location.origin}${location.pathname}?join=${myRoomCode}`;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy Invite Link', 2000);
  });
}

async function joinRoom(codeOverride) {
  const nickname = getNickname(); if (!nickname) return;
  const code = (codeOverride || document.getElementById('join-code').value.trim()).toUpperCase();
  if (code.length !== 6) { showMsg('msg-join', 'Enter a 6-character room code.', 'error'); return; }
  try {
    const { data: room, error: rErr } = await db.from('domino_rooms')
      .select('*').eq('code', code).eq('status', 'waiting').single();
    if (rErr || !room) { showMsg('msg-join', 'Room not found or game already started.', 'error'); return; }

    const { data: existing } = await db.from('domino_players').select('seat').eq('room_id', room.id);
    if ((existing || []).length >= 4) { showMsg('msg-join', 'Room is full!', 'error'); return; }

    // Assign first free seat
    const { data: existing2 } = await db.from('domino_players').select('seat').eq('room_id', room.id);
    const takenSeats = (existing2 || []).map(p => p.seat);
    const freeSeat = [0,1,2,3].find(s => !takenSeats.includes(s));
    if (freeSeat === undefined) { showMsg('msg-join', 'Room is full!', 'error'); return; }

    const { data: player, error: pErr } = await db.from('domino_players')
      .insert({ room_id: room.id, seat: freeSeat, nickname, hand: [], is_connected: true })
      .select().single();
    if (pErr) throw pErr;

    myPlayerId = player.id; myRoomId = room.id; myRoomCode = code;
    mySeat = freeSeat; myPanel = 'join';

    document.getElementById('waiting-join').classList.add('visible');
    await loadAndRenderPlayers(room.id, 'join');
    subscribeToRoom(room.id, 'join');
  } catch (e) { showMsg('msg-join', 'Error: ' + e.message, 'error'); }
}

function subscribeToRoom(roomId, panel) {
  if (roomChannel) { db.removeChannel(roomChannel); roomChannel = null; }
  roomChannel = db.channel('room-' + roomId + '-' + Date.now())
    .on('postgres_changes', { event: '*', schema: 'public', table: 'domino_players', filter: `room_id=eq.${roomId}` },
      async () => { await loadAndRenderPlayers(roomId, panel); })
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'domino_rooms', filter: `id=eq.${roomId}` },
      async (payload) => {
        if (payload.new.status === 'playing') {
          // Read fresh seat from DB — host may have reassigned seats for Asosyé
          if (myPlayerId) {
            const { data: me } = await db.from('domino_players')
              .select('seat').eq('id', myPlayerId).single();
            if (me) mySeat = me.seat;
          }
          sessionStorage.setItem('domino_player', JSON.stringify({
            seat: mySeat,
            nickname: document.getElementById('nickname').value.trim(),
            roomId: myRoomId, roomCode: myRoomCode,
            gameMode: payload.new.game_mode || 'chien',
            aiDifficulty: payload.new.ai_difficulty || null,
          }));
          location.href = 'game.html';
        }
      })
    .subscribe((status) => { setConnected(panel, status === 'SUBSCRIBED'); });
}

async function loadQueueCount() {
  const { data } = await db.from('queue').select('id').eq('status', 'waiting');
  document.getElementById('queue-count').textContent = (data?.length ?? 0) + ' / 4';
}

async function joinQueue() {
  const nickname = getNickname(); if (!nickname) return;
  document.getElementById('btn-queue').style.display = 'none';
  document.getElementById('btn-leave-queue').style.display = 'block';
  const { data: qEntry } = await db.from('queue').insert({ nickname, status: 'waiting' }).select().single();
  myPlayerId = qEntry.id;
  queueChannel = db.channel('queue-watch-' + qEntry.id)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'queue' }, async () => {
      const { data } = await db.from('queue').select('*').eq('status', 'waiting').order('created_at');
      document.getElementById('queue-count').textContent = (data?.length ?? 0) + ' / 4';
      renderPlayers('players-match', (data||[]).slice(0,4).map((p,i) => ({...p, seat:i})),
        (data||[]).findIndex(p => p.id === myPlayerId));
      if ((data||[]).length >= 4 && data[0].id === myPlayerId) await autoCreateMatchRoom(data.slice(0,4));
    }).subscribe();
  document.getElementById('waiting-match').classList.add('visible');
  loadQueueCount();
}

async function autoCreateMatchRoom(queuePlayers) {
  const code = generateRoomCode();
  const { data: room } = await db.from('domino_rooms').insert({ code, status: 'waiting', current_turn: 0 }).select().single();
  for (let i = 0; i < 4; i++)
    await db.from('queue').update({ matched_room: room.id, status: 'matched' }).eq('id', queuePlayers[i].id);
  for (let i = 0; i < 4; i++)
    await db.from('domino_players').insert({ room_id: room.id, seat: i, nickname: queuePlayers[i].nickname, hand: [], is_connected: true });
  sessionStorage.setItem('domino_player', JSON.stringify({ seat: 0, nickname: queuePlayers[0].nickname, roomId: room.id, roomCode: room.code }));
  location.href = 'game.html';
}

async function leaveQueue() {
  if (myPlayerId) await db.from('queue').delete().eq('id', myPlayerId);
  if (queueChannel) { db.removeChannel(queueChannel); queueChannel = null; }
  document.getElementById('btn-queue').style.display = 'block';
  document.getElementById('btn-leave-queue').style.display = 'none';
  document.getElementById('waiting-match').classList.remove('visible');
  myPlayerId = null; loadQueueCount();
}

async function startGame() {
  if (!myRoomId) return;

  let players = (await db.from('domino_players').select('*').eq('room_id', myRoomId).order('seat')).data || [];

  // ── Asosyé: reassign seats based on partner selection ──────────
  // Seats 0 & 2 = Team A (partners), Seats 1 & 3 = Team B (partners)
  // Host = seat 0, host's partner = seat 2, others = seats 1 & 3
  if (selectedMode === 'asosye' && selectedPartnerId !== null) {
    const me      = players.find(p => p.id === myPlayerId);
    const partner = players.find(p => p.id === selectedPartnerId);
    const others  = players.filter(p => p.id !== myPlayerId && p.id !== selectedPartnerId);

    if (me && partner && others.length === 2) {
      // Use temp seats (10-13) first to avoid unique constraint conflicts
      await db.from('domino_players').update({ seat: 10 }).eq('id', me.id);
      await db.from('domino_players').update({ seat: 11 }).eq('id', partner.id);
      await db.from('domino_players').update({ seat: 12 }).eq('id', others[0].id);
      await db.from('domino_players').update({ seat: 13 }).eq('id', others[1].id);
      // Now assign final seats: host=0, partner=2 (across), opponents=1&3
      await db.from('domino_players').update({ seat: 0 }).eq('id', me.id);
      await db.from('domino_players').update({ seat: 2 }).eq('id', partner.id);
      await db.from('domino_players').update({ seat: 1 }).eq('id', others[0].id);
      await db.from('domino_players').update({ seat: 3 }).eq('id', others[1].id);
      mySeat = 0;
      // Refresh players with new seats
      players = (await db.from('domino_players').select('*').eq('room_id', myRoomId).order('seat')).data || [];
    }
  }

  // Solo mode: fill empty seats with AI bots
  if (selectedMode === 'solo') {
    const aiNames = ['Bot Djo', 'Bot Marie', 'Bot Bobo'];
    let botIdx = 0;
    for (let seat = 0; seat < 4; seat++) {
      if (!players.find(p => p.seat === seat)) {
        await db.from('domino_players').insert({
          room_id: myRoomId, seat, nickname: aiNames[botIdx++] || 'Bot',
          hand: [], is_connected: true, is_ai: true
        });
      }
    }
    players = (await db.from('domino_players').select('*').eq('room_id', myRoomId).order('seat')).data || [];
  } else if (players.length < 4) {
    alert('Need 4 players to start!'); return;
  }

  const tiles = shuffle(generateDominoSet());
  const hands = [tiles.slice(0,7), tiles.slice(7,14), tiles.slice(14,21), tiles.slice(21,28)];
  for (let i = 0; i < 4; i++)
    await db.from('domino_players').update({ hand: hands[i] }).eq('room_id', myRoomId).eq('seat', i);

  await db.from('game_events').delete().eq('room_id', myRoomId);
  await db.from('board').delete().eq('room_id', myRoomId);
  const { error: bErr } = await db.from('board').insert({ room_id: myRoomId, tiles: [], left_end: null, right_end: null });
  if (bErr && !bErr.message.includes('unique')) console.warn('Board insert:', bErr.message);

  let startingSeat = 0;
  for (let i = 0; i < 4; i++)
    if (hands[i].some(t => t[0] === 6 && t[1] === 6)) { startingSeat = i; break; }

  await db.from('domino_rooms').update({
    status: 'playing',
    current_turn: startingSeat,
    game_mode: selectedMode,
    ai_difficulty: selectedMode === 'solo' ? selectedAIDiff : null,
    scores: [0,0,0,0],
    streak: { seat: null, team: null, count: 0 },
    pending_point: false,
    round: 1,
    match_winner: null
  }).eq('id', myRoomId);
}
