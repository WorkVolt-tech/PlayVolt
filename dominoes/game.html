// ==================== FIXED SNAKE POSITIONING ====================
function computeSnakePositions(tiles, W, H) {
  if (tiles.length === 0) return [];

  const MARGIN = 60;
  const positions = [];

  let x = W / 2;
  let y = H / 2;
  let dir = 1;                    // 1 = right, -1 = left
  let isHorizontalRun = true;

  for (let i = 0; i < tiles.length; i++) {
    const entry = tiles[i];
    const isDouble = entry.tile[0] === entry.tile[1];

    // Determine orientation
    let renderVertical = isDouble;
    if (!isHorizontalRun) renderVertical = true;   // corner tiles are vertical

    const w = renderVertical ? TW : TH;
    const h = renderVertical ? TH : TW;

    positions.push({
      x: Math.round(x),
      y: Math.round(y),
      dir: dir,
      pw: w,
      ph: h,
      renderVertical
    });

    if (i === tiles.length - 1) break;

    const nextEntry = tiles[i + 1];
    const nextIsDouble = nextEntry.tile[0] === nextEntry.tile[1];
    const nextRenderVertical = !isHorizontalRun || nextIsDouble;
    const nw = nextRenderVertical ? TW : TH;
    const nh = nextRenderVertical ? TH : TW;

    if (isHorizontalRun) {
      const nextX = x + dir * (w / 2 + GAP + nw / 2);

      if (nextX - nw / 2 < MARGIN || nextX + nw / 2 > W - MARGIN) {
        // === CORNER TURN ===
        isHorizontalRun = false;
        x = x + dir * (w / 2 - TW / 2);        // align to edge
        y = y + h / 2 + GAP + nh / 2;          // move down
        dir *= -1;
      } else {
        x = nextX;
      }
    } else {
      // Resume horizontal after corner
      isHorizontalRun = true;
      x = x + dir * (w / 2 + GAP + nw / 2);
      // y stays the same
    }
  }
  return positions;
}

// ==================== UPDATED RENDER BOARD ====================
function renderBoard() {
  const container = document.getElementById('board-container');
  const hint = document.getElementById('board-hint');
  const dropL = document.getElementById('drop-left');
  const dropR = document.getElementById('drop-right');

  container.innerHTML = '';

  const hasTiles = boardData && Array.isArray(boardData.tiles) && boardData.tiles.length > 0;
  if (!hasTiles) {
    hint.style.display = 'block';
    document.getElementById('board-hint-text').textContent = isMyTurn ? 'Click a tile to place it' : 'Place the first tile';
    dropL.style.display = 'none';
    dropR.style.display = 'none';
    return;
  }

  hint.style.display = 'none';

  const area = document.getElementById('board-area');
  const W = area.clientWidth || 800;
  const H = area.clientHeight || 400;

  const tiles = boardData.tiles;
  const positions = computeSnakePositions(tiles, W, H);

  tiles.forEach((entry, i) => {
    const pos = positions[i];
    const isDbl = entry.tile[0] === entry.tile[1];

    let displayTile = [...entry.tile];
    if (!isDbl) {
      const logicalFlip = !!entry.flipped;
      const visualMirror = pos.dir === -1;
      if (logicalFlip !== visualMirror) displayTile = [entry.tile[1], entry.tile[0]];
    }

    const tileEl = createTileElement(displayTile[0], displayTile[1], pos.renderVertical, isDbl);
    tileEl.classList.add('board-tile');
    tileEl.classList.add(pos.renderVertical ? 'vertical' : 'horizontal');
    tileEl.style.left = `${pos.x - pos.pw / 2}px`;
    tileEl.style.top = `${pos.y - pos.ph / 2}px`;
    tileEl.style.zIndex = i + 1;
    container.appendChild(tileEl);
  });

  // Drop zones
  const canLeft = selectedTile && isMyTurn && canPlayOnSide(selectedTile.tile, 'left');
  const canRight = selectedTile && isMyTurn && canPlayOnSide(selectedTile.tile, 'right');

  const posL = positions[0];
  const posR = positions[positions.length - 1];

  if (canLeft && posL) {
    Object.assign(dropL.style, {
      display: 'flex',
      left: `${Math.max(4, posL.x - posL.pw / 2 - 76)}px`,
      top: `${posL.y - 22}px`,
      width: '68px',
      height: '44px'
    });
  } else dropL.style.display = 'none';

  if (canRight && posR) {
    Object.assign(dropR.style, {
      display: 'flex',
      left: `${Math.min(W - 76, posR.x + posR.pw / 2 + 4)}px`,
      top: `${posR.y - 22}px`,
      width: '68px',
      height: '44px'
    });
  } else dropR.style.display = 'none';
}
